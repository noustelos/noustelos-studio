<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow, max-image-preview:large" />
  <meta name="description" content="Abyss Drift from Noustelos UX Lab: a procedural Three.js underwater study with wireframe terrain and drifting forms." />
  <meta name="theme-color" content="#000000" />
  <link rel="canonical" href="https://noustelos.gr/lab/visual-abyss-drift.html" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Abyss Drift | Visual Experiments | UX Lab" />
  <meta property="og:description" content="Procedural underwater Three.js study with wireframe terrain and volumetric atmosphere." />
  <meta property="og:url" content="https://noustelos.gr/lab/visual-abyss-drift.html" />
  <meta property="og:image" content="https://noustelos.gr/assets/og/hero-share.png" />
  <title>Abyss Drift | Visual Experiments | UX Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.min.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/"
      }
    }
  </script>
  <link rel="stylesheet" href="visual-abyss-drift.min.css" />
  <style>
    body.lab-abyss-page {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .abyss-fullscreen {
      position: relative;
      min-height: 100vh;
      width: 100%;
    }

    #abyssCanvasRoot {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #abyssCanvasRoot canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .abyss-top-controls {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px;
      border: 1px solid rgba(232, 232, 232, 0.82);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 10px 24px rgba(17, 17, 17, 0.16);
    }

    .abyss-top-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 44px;
      padding: 10px 16px;
      border: 1px solid rgba(232, 232, 232, 1);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      color: rgba(17, 17, 17, 1);
      text-decoration: none;
      font-family: "Space Grotesk", sans-serif;
      font-size: 13px;
      letter-spacing: 0.05em;
      font-weight: 600;
      text-transform: uppercase;
      transition: border-color 0.2s ease, color 0.2s ease;
    }

    .abyss-top-link:hover,
    .abyss-top-link:focus-visible {
      border-color: rgba(115, 123, 133, 0.42);
      color: rgba(17, 17, 17, 1);
    }

    .abyss-credit {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 3;
      margin: 0;
      padding: 10px 14px;
      border: 1px solid rgba(232, 232, 232, 0.82);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      color: rgba(17, 17, 17, 0.92);
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      line-height: 1.45;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 10px 24px rgba(17, 17, 17, 0.16);
    }

    .abyss-credit strong {
      color: rgba(17, 17, 17, 1);
      font-weight: 600;
    }

    @media (max-width: 720px) {
      .abyss-top-controls {
        top: 10px;
        right: 10px;
        gap: 8px;
        padding: 8px;
      }

      .abyss-top-link {
        font-size: 11px;
        padding: 9px 12px;
      }

      .abyss-credit {
        left: 10px;
        right: 10px;
        bottom: 10px;
        border-radius: 18px;
        text-align: center;
      }
    }
  </style>
</head>
<body class="lab-abyss-page" data-i18n-page="abyssDrift">
  <main class="abyss-fullscreen" aria-label="Abyss Drift fullscreen scene">
    <div id="abyssCanvasRoot" aria-hidden="true"></div>

    <div class="abyss-top-controls">
      <a class="abyss-top-link" href="index.html" aria-label="Back to UX Lab" data-i18n-attr="aria-label:common.backToLab">
        <span>UX Lab</span>
        <span>/&gt;</span>
      </a>
      <button class="lang-toggle" type="button" data-i18n-attr="aria-label:common.switchAria">
        <span data-lang-option="en">EN</span>
        <span class="lang-divider">/</span>
        <span data-lang-option="gr">EL</span>
      </button>
    </div>

    <p class="abyss-credit">
      Inspired by original code by <strong>Paul (@prisoner849)</strong>.
    </p>
  </main>

  <script src="visual-language-toggle.js"></script>
  <script type="module" src="visual-abyss-drift.js"></script>
</body>
</html>
