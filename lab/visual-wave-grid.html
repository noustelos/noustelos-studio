<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow, max-image-preview:large" />
  <meta name="description" content="Wave Grid from Noustelos UX Lab: a fullscreen canvas study with reactive geometric patterns and click-triggered waves." />
  <meta name="theme-color" content="#050505" />
  <link rel="canonical" href="https://noustelos.gr/lab/visual-wave-grid.html" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Wave Grid | Visual Experiments | UX Lab" />
  <meta property="og:description" content="Canvas-driven geometric field with pointer proximity and click-triggered waves." />
  <meta property="og:url" content="https://noustelos.gr/lab/visual-wave-grid.html" />
  <meta property="og:image" content="https://noustelos.gr/assets/og/wave-grid-share.svg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Wave Grid | Visual Experiments | UX Lab" />
  <meta name="twitter:description" content="Canvas-driven geometric field with pointer proximity and click-triggered waves." />
  <meta name="twitter:image" content="https://noustelos.gr/assets/og/wave-grid-share.svg" />
  <title>Wave Grid | Visual Experiments | UX Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="visual-wave-grid.min.css" />
  <style>
    body.lab-wave-grid-page {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: #050505;
    }

    .wave-shell {
      position: static;
      min-height: 0;
      width: auto;
      margin: 0;
      padding: 0;
      display: block;
    }

    .wave-top-controls {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px;
      border: 1px solid rgba(232, 232, 232, 0.82);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 10px 24px rgba(17, 17, 17, 0.16);
    }

    .wave-version-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .wave-version-link {
      text-decoration: none;
      min-height: 44px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(232, 232, 232, 1);
      font-family: "Space Grotesk", sans-serif;
      font-size: 13px;
      letter-spacing: 0.06em;
      font-weight: 600;
      text-transform: uppercase;
      color: rgba(68, 68, 68, 1);
      background: rgba(255, 255, 255, 0.94);
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .wave-version-link:hover,
    .wave-version-link:focus-visible {
      border-color: rgba(115, 123, 133, 0.42);
      color: rgba(17, 17, 17, 1);
    }

    .wave-version-link.is-active {
      background: rgba(17, 17, 17, 1);
      color: rgba(255, 255, 255, 0.95);
      border-color: rgba(17, 17, 17, 1);
      font-weight: 700;
    }

    .wave-back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 44px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(232, 232, 232, 1);
      text-decoration: none;
      font-family: "Space Grotesk", sans-serif;
      font-size: 13px;
      letter-spacing: 0.05em;
      font-weight: 600;
      text-transform: uppercase;
      color: rgba(17, 17, 17, 1);
      background: rgba(255, 255, 255, 0.94);
    }

    .wave-back-link:hover,
    .wave-back-link:focus-visible {
      border-color: rgba(115, 123, 133, 0.42);
      color: rgba(17, 17, 17, 1);
    }

    @media (max-width: 720px) {
      .wave-top-controls {
        width: calc(100% - 20px);
        justify-content: center;
        flex-wrap: wrap;
      }

      .wave-version-link,
      .wave-back-link {
        font-size: 11px;
        padding: 9px 12px;
      }
    }
  </style>
</head>
<body class="lab-wave-grid-page" data-i18n-page="waveGrid">
  <canvas class="wave-canvas"></canvas>

  <main class="wave-shell" aria-label="Wave Grid fullscreen controls">
    <div class="wave-top-controls">
      <nav class="wave-version-toggle" aria-label="Toggle wave grid version">
        <a class="wave-version-link is-active" href="visual-wave-grid.html" aria-current="page">B/W version</a>
        <a class="wave-version-link" href="visual-wave-grid-original.html">Original color</a>
      </nav>
      <a class="wave-back-link" href="index.html" aria-label="Back to UX Lab">
        <span>UX Lab</span>
        <span>/&gt;</span>
      </a>
    </div>
  </main>

  <script src="visual-wave-grid.min.js"></script>
</body>
</html>
