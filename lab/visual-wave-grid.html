<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow, max-image-preview:large" />
  <meta name="description" content="Wave Grid from Noustelos UX Lab: a fullscreen canvas study with reactive geometric patterns and click-triggered waves." />
  <meta name="theme-color" content="#050505" />
  <link rel="canonical" href="https://noustelos.gr/lab/visual-wave-grid.html" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Wave Grid | Visual Experiments | UX Lab" />
  <meta property="og:description" content="Canvas-driven geometric field with pointer proximity and click-triggered waves." />
  <meta property="og:url" content="https://noustelos.gr/lab/visual-wave-grid.html" />
  <meta property="og:image" content="https://noustelos.gr/assets/og/wave-grid-share.svg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Wave Grid | Visual Experiments | UX Lab" />
  <meta name="twitter:description" content="Canvas-driven geometric field with pointer proximity and click-triggered waves." />
  <meta name="twitter:image" content="https://noustelos.gr/assets/og/wave-grid-share.svg" />
  <title>Wave Grid | Visual Experiments | UX Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.min.css" />
  <link rel="stylesheet" href="visual-wave-grid.min.css" />
  <style>
    .wave-credit {
      margin: 1.05rem 0 0;
      padding-top: 0.62rem;
      border-top: 1px solid rgba(255, 255, 255, 0.14);
      max-width: 42ch;
      font-family: "IBM Plex Mono", monospace;
      font-size: clamp(11px, 1.45vw, 12px);
      line-height: 1.6;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.76);
    }

    .wave-credit strong {
      color: rgba(255, 255, 255, 0.95);
      font-weight: 500;
    }
  </style>
</head>
<body class="lab-wave-grid-page" data-i18n-page="waveGrid">
  <canvas class="wave-canvas"></canvas>

  <main class="wave-shell" aria-labelledby="wave-grid-title">
    <div class="wave-topbar">
      <a class="wave-back-link" href="index.html" aria-label="Back to UX Lab" data-i18n-attr="aria-label:common.backToLab">
        <span>UX Lab</span>
        <span>/&gt;</span>
      </a>
      <button class="lang-toggle" type="button" data-i18n-attr="aria-label:common.switchAria">
        <span data-lang-option="en">EN</span>
        <span class="lang-divider">/</span>
        <span data-lang-option="gr">EL</span>
      </button>

      <div class="wave-meta-pill" data-shape-mask data-i18n="page.pill">Visual Experiments / Study 05</div>
    </div>

    <section class="wave-stage">
      <section class="wave-hero" data-shape-mask>
        <div>
          <p class="wave-kicker" data-i18n="page.kicker">Canvas Field</p>
          <h1 id="wave-grid-title" class="wave-title">
            Wave
            <span>Grid</span>
          </h1>
          <p class="wave-intro" data-i18n="page.intro">
            A fullscreen geometric field that reacts to pointer proximity and builds wave pulses on each click.
          </p>

          <div class="wave-actions">
            <button class="wave-button" type="button" id="triggerCenterWave">
              <strong>Wave</strong>
              <span data-i18n="page.centerPulse">Pulse from center</span>
            </button>
            <button class="wave-button" type="button" id="triggerRandomWave">
              <strong>Random</strong>
              <span data-i18n="page.randomPulse">Random impact point</span>
            </button>
          </div>

          <div class="wave-controls" aria-label="Wave Grid controls">
            <label class="wave-control" for="gridDensity">
              <span class="wave-control-head">
                <span>Density</span>
                <output id="gridDensityValue" for="gridDensity">40 px</output>
              </span>
              <input id="gridDensity" type="range" min="28" max="64" step="4" value="40" />
            </label>

            <label class="wave-control" for="waveVelocity">
              <span class="wave-control-head">
                <span data-i18n="page.waveSpeed">Wave speed</span>
                <output id="waveVelocityValue" for="waveVelocity">1200 /s</output>
              </span>
              <input id="waveVelocity" type="range" min="700" max="1800" step="50" value="1200" />
            </label>
          </div>

          <p class="wave-credit">
            Inspired by original code by <strong>Stijn Van Minnebruggen (@donotfold)</strong>.
          </p>
        </div>

      </section>

    </section>

    <a class="wave-footer-link" href="index.html" aria-label="Back to UX Lab" data-i18n-attr="aria-label:common.backToLab">
      <span data-i18n="page.footerLabel">Back to UX Lab</span>
      <span>/&gt;</span>
    </a>
  </main>

  <script src="visual-language-toggle.js"></script>
  <script src="visual-wave-grid.min.js"></script>
</body>
</html>
