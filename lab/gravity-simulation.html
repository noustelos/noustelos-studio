<body class="lab-page page-id-42 page-id-42-gravity">
  <main class="gravity-ui-shell" aria-labelledby="gravity-ui-title">
    <header class="gravity-ui-head">
      <div>
        <h1 id="gravity-ui-title" class="gravity-ui-title">gravity simulation<span class="gravity-ui-title-mark" aria-hidden="true">/&gt;</span></h1>
      </div>
      <a class="gravity-ui-back" href="index.html">Back to UX Lab /&gt;</a>
    </header>

    <section class="lab-card lab-gravity-card" aria-label="Gravity simulation card">
      <p class="gravity-ui-note">click inside the field to spawn objects</p>

      <div class="gravity-controls">
        <label for="gravitySlider">PLANET GRAVITY</label>
        <input type="range" min="0" max="8" step="1" value="2" id="gravitySlider">
        <div class="gravity-label" aria-live="polite"></div>
        <div class="planet-icon" aria-hidden="true"></div>
        <button class="gravity-clear" type="button">clear simulation /&gt;</button>
      </div>

      <div class="lab-physics impact-glow" aria-label="Gravity simulation field"></div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="gravity-simulation.min.js"></script>
</body>
