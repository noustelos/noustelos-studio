<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{if(localStorage.getItem('siteLanguage')==='gr')document.documentElement.lang='el';}catch(e){}})()</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="index, follow, max-image-preview:large" />
  <meta name="description" content="Neumorphic UI from Noustelos UX Lab: interactive soft-UI tiles with adjustable depth, layered shadows and tactile motion." />
  <meta name="theme-color" content="#dedbd8" />
  <link rel="canonical" href="https://noustelos.gr/lab/visual-neumorphic.html" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Neumorphic UI | Visual Experiments | UX Lab" />
  <meta property="og:description" content="Interactive soft-UI tiles with adjustable depth — a neumorphism study from Noustelos UX Lab." />
  <meta property="og:url" content="https://noustelos.gr/lab/visual-neumorphic.html" />
  <meta property="og:image" content="https://noustelos.gr/assets/og/hero-share.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Neumorphic UI | Visual Experiments | UX Lab" />
  <meta name="twitter:description" content="Interactive soft-UI tiles with adjustable depth — a neumorphism study from Noustelos UX Lab." />
  <meta name="twitter:image" content="https://noustelos.gr/assets/og/hero-share.png" />
  <title>Neumorphic UI | Visual Experiments | UX Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans+Pinstripe&family=Fira+Code:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="visual-neumorphic.min.css" />
</head>
<body class="lab-neumorphic-page" data-i18n-page="neumorphic">
  <main class="nm-shell">

    <div class="nm-topbar">
      <a class="nm-back-link" href="index.html" aria-label="Back to UX Lab" data-i18n-attr="aria-label:common.backToLab">
        <span>UX Lab</span>
        <span>/&gt;</span>
      </a>
      <button class="nm-lang-toggle lang-toggle" type="button" data-i18n-attr="aria-label:common.switchAria">
        <span data-lang-option="en">EN</span>
        <span class="lang-divider">/</span>
        <span data-lang-option="gr">EL</span>
      </button>
    </div>

    <div class="nm-header">
      <p class="nm-eyebrow" data-i18n="page.eyebrow">Visual Experiments</p>
      <h1 class="nm-title" data-i18n="page.title">Neumorphic UI</h1>
      <p class="nm-desc" data-i18n="page.intro">A soft-UI study based on neumorphism — using layered shadows and gradients to simulate tactile depth without textures or images.</p>
    </div>

    <div class="nm-controls">
      <label class="nm-slider-label" for="nm-depth-slider">
        <span data-i18n="page.depthLabel">Depth</span>
        <span class="nm-slider-value" id="nm-depth-value" aria-live="polite">1.00</span>
      </label>
      <input
        class="nm-slider"
        type="range"
        id="nm-depth-slider"
        min="0"
        max="2"
        step="0.05"
        value="1"
        aria-label="Adjust shadow depth"
      />
    </div>

    <section class="nm-stage" aria-label="Neumorphic tile demos">

      <div class="nm-tile-row">
        <div class="nm-tile nm-up">
          <span>Up</span>
        </div>
        <div class="nm-tile nm-down">
          <span>Down</span>
        </div>
        <div class="nm-tile nm-padded nm-up">
          <div class="nm-tile nm-down">
            <span>Up &amp;<br />Down</span>
          </div>
        </div>
        <div class="nm-tile nm-button" role="button" tabindex="0" aria-label="Neumorphic button demo — hover to press">
          <div class="nm-tile">
            <span>Button</span>
          </div>
        </div>
      </div>

      <div class="nm-tile-row">
        <div class="nm-tile nm-tile--circle nm-round">
          <span>Up</span>
        </div>
        <div class="nm-tile nm-tile--circle nm-round-down">
          <span>Down</span>
        </div>
        <div class="nm-tile nm-tile--circle nm-round-button" role="button" tabindex="0" aria-label="Neumorphic circle button demo — hover to press">
          <span>Button</span>
        </div>
      </div>

    </section>

    <a class="nm-footer-link" href="index.html" aria-label="Back to UX Lab" data-i18n-attr="aria-label:common.backToLab">
      <span data-i18n="page.footerLabel">Back to UX Lab</span>
      <span>/&gt;</span>
    </a>

  </main>

  <script>
    (function () {
      var slider = document.getElementById('nm-depth-slider');
      var valueEl = document.getElementById('nm-depth-value');
      var root = document.documentElement;

      function updateDepth(val) {
        root.style.setProperty('--height', val);
        valueEl.textContent = parseFloat(val).toFixed(2);
      }

      slider.addEventListener('input', function () {
        updateDepth(slider.value);
      });
    }());
  </script>
  <script src="i18n-utils.js"></script>
  <script src="visual-language-toggle.js"></script>
</body>
</html>
