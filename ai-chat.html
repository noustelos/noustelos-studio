<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, follow" />
  <meta name="description" content="NOUSTELOS Digital Assistant για γρήγορη υποστήριξη και πληροφορίες σχετικά με το Noustelos Studio." />
  <meta name="theme-color" content="#ffffff" />
  <link rel="canonical" href="https://noustelos.gr/ai-chat.html" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Noustelos Studio" />
  <meta property="og:title" content="NOUSTELOS Digital Assistant" />
  <meta property="og:description" content="Συνομιλήστε με την τεχνητή νοημοσύνη μας για επαγγελματική υποστήριξη και πληροφορίες." />
  <meta property="og:url" content="https://noustelos.gr/ai-chat.html" />
  <meta property="og:image" content="https://noustelos.gr/assets/og/hero-share.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="NOUSTELOS Digital Assistant" />
  <meta name="twitter:description" content="Συνομιλήστε με την τεχνητή νοημοσύνη μας για επαγγελματική υποστήριξη και πληροφορίες." />
  <meta name="twitter:image" content="https://noustelos.gr/assets/og/hero-share.png" />
  <title>NOUSTELOS Digital Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <script>
    document.documentElement.classList.add('fonts-pending');
  </script>
  <link rel="stylesheet" href="styles.min.css" />
</head>
<body class="chat-page-body">
  <main class="chat-page" aria-label="NOUSTELOS Digital Assistant">
    <header class="chat-page-header">
      <div class="chat-page-header-inner">
        <a class="chat-page-back" href="index.html">Back to Noustelos_Studio /&gt;</a>
      </div>
    </header>

    <div class="chat-page-frame-shell is-loading">
      <div class="chat-page-frame-wrap">
        <iframe
          class="chat-page-frame"
          src="https://nik-greek-my-site-bot.hf.space/?__theme=light"
          title="Συνομιλία με το AI του Noustelos Studio"
          loading="eager"
        ></iframe>
      </div>
      <div class="hero-mark-wrap chat-page-mark webgl-pending" role="img" aria-label="Animated symbol /&gt;">
        <canvas class="hero-mark-canvas" aria-hidden="true"></canvas>
        <span class="hero-mark-fallback">/&gt;</span>
      </div>
      <a class="chat-page-back chat-page-back-bottom" href="index.html">Back to Noustelos_Studio /&gt;</a>
    </div>
  </main>
  <script src="chat-hero-mark.min.js"></script>
  <script>
    (function () {
      var shell = document.querySelector('.chat-page-frame-shell');
      var frame = document.querySelector('.chat-page-frame');

      if (!shell || !frame) {
        return;
      }

      var revealFrame = function () {
        window.setTimeout(function () {
          shell.classList.remove('is-loading');
          shell.classList.add('is-loaded');
        }, 700);
      };

      frame.addEventListener('load', revealFrame, { once: true });
      window.setTimeout(revealFrame, 4500);
    })();
  </script>
</body>
</html>
