<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Now linked publicly from the portfolio as "The Artifact" (guest code gated) -->
  <meta name="robots" content="index, follow" />
  <meta name="referrer" content="no-referrer" />
  <meta name="theme-color" content="#0a0a16" id="themeColor" />
  <meta name="description" content="The Artifact — an experimental two-voice AI chat playground with switchable personas, a live persona tuner, voice and streaming, on a stateless Cloudflare Worker in front of Google's Gemma model. Passphrase-gated." />
  <link rel="canonical" href="https://noustelos.gr/secret-artifact/" />

  <title>THE ARTIFACT // ENGINE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Vault skin fonts (arcane / Foundation look). Loaded for all, applied only when data-skin="vault". -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       SKIN SYSTEM
       The whole visual identity is driven by the variables below.
       :root holds the default "Neon" skin (deep-space / cyberpunk).
       :root[data-skin="vault"] overrides them with the obsidian + gold
       "Foundation" arcane look. The data-skin attribute is set on <html>
       by JS (header SKIN button, persisted in localStorage). Everything
       else — layout, copy, personas, the engine — is skin-agnostic.

       Accents are stored as bare R,G,B triples so any rgba(...) glow can
       theme: rgba(var(--rgb-1), .35). The named colors derive from them.
       ============================================================ */
    :root {
      /* Deep space / cyberpunk palette (default skin) */
      --rgb-1:   34, 230, 255;   /* primary accent  — cyan      */
      --rgb-2:   255, 43, 214;   /* secondary accent — magenta  */
      --rgb-3:   138, 91, 255;   /* tertiary accent — violet    */
      --rgb-bg0: 5, 5, 13;       /* deepest background          */
      --rgb-bg1: 10, 10, 22;     /* panel background            */
      --rgb-bg2: 17, 17, 42;     /* raised background           */

      --bg-0:        rgb(var(--rgb-bg0));
      --bg-1:        rgb(var(--rgb-bg1));
      --bg-2:        rgb(var(--rgb-bg2));
      --grid:        rgba(178, 75, 255, 0.16);
      --glow-cyan:   rgb(var(--rgb-1));
      --glow-magenta:rgb(var(--rgb-2));
      --glow-violet: rgb(var(--rgb-3));
      --ink:         #eaf2ff;
      --ink-dim:     #8f9bc7;
      --ink-hi-1:    #d6fbff;    /* bright highlight on accent-1 text */
      --ink-hi-2:    #ffd9f5;    /* bright highlight on accent-2 text */
      --on-accent:   var(--bg-0); /* text/border sitting ON an accent fill */
      --bubble-user: rgba(var(--rgb-1), 0.10);
      --bubble-bot:  rgba(var(--rgb-2), 0.09);

      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'Fira Code', 'SFMono-Regular', Menlo, Consolas, monospace;
      /* font sizing nudge per skin (Cormorant runs smaller than Inter) */
      --msg-size: 0.95rem;
    }

    /* ---- Vault skin: obsidian + gold "Foundation" ---- */
    :root[data-skin="vault"] {
      --rgb-1:   201, 162, 75;   /* primary accent  — gold              */
      --rgb-2:   201, 119, 75;   /* secondary accent — warm copper      */
      --rgb-3:   107, 91, 214;   /* tertiary accent — violet glow only  */
      --rgb-bg0: 5, 5, 9;        /* #050509 */
      --rgb-bg1: 10, 9, 16;      /* #0a0910 */
      --rgb-bg2: 21, 19, 31;     /* #15131f */

      --grid:        rgba(201, 162, 75, 0.10);
      --ink:         #efe6cf;    /* parchment */
      --ink-dim:     #8b8167;    /* muted gold-grey */
      --ink-hi-1:    #f3ead2;    /* bright parchment on gold bubbles */
      --ink-hi-2:    #efe6cf;
      --bubble-user: rgba(201, 162, 75, 0.06);
      --bubble-bot:  rgba(107, 91, 214, 0.07);

      --font-sans: 'Cormorant Garamond', 'Iowan Old Style', Georgia, serif;
      --font-mono: 'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace;
      --msg-size: 1.12rem;       /* Cormorant needs a touch more size */
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      min-height: 100dvh;
      background-color: var(--bg-0);
      color: var(--ink);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      /* Procedural neon grid + radial space glow */
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -10%, rgba(var(--rgb-3), 0.22), transparent 60%),
        radial-gradient(ellipse 90% 60% at 90% 110%, rgba(var(--rgb-2), 0.14), transparent 55%),
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        linear-gradient(180deg, var(--bg-1), var(--bg-0));
      background-size:
        100% 100%,
        100% 100%,
        44px 44px,
        44px 44px,
        100% 100%;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(0.75rem, 2.5vw, 2rem);
    }

    /* ============ Glassmorphic chat container ============ */
    .artifact {
      position: relative; /* positioning context for the tuner dropdown overlay */
      width: 100%;
      max-width: 760px;
      height: min(92dvh, 880px);
      display: flex;
      flex-direction: column;
      background: linear-gradient(160deg, rgba(var(--rgb-bg2), 0.78), rgba(var(--rgb-bg1), 0.72));
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid rgba(var(--rgb-1), 0.35);
      border-radius: 20px;
      box-shadow:
        0 0 0 1px rgba(var(--rgb-2), 0.12),
        0 0 40px rgba(var(--rgb-1), 0.12),
        0 0 80px rgba(var(--rgb-2), 0.10),
        0 30px 80px rgba(0, 0, 0, 0.6);
      overflow: hidden;
    }

    /* ============ Header pack ============ */
    .artifact-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid rgba(var(--rgb-3), 0.28);
      background: linear-gradient(90deg, rgba(var(--rgb-1), 0.06), rgba(var(--rgb-2), 0.06));
    }

    .artifact-title {
      font-family: var(--font-mono);
      font-size: clamp(0.74rem, 2.6vw, 0.95rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-shadow: 0 0 12px rgba(var(--rgb-1), 0.45);
      white-space: nowrap;
    }
    .artifact-title .sep { color: var(--glow-magenta); }

    .artifact-state {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--ink-dim);
      white-space: nowrap;
    }

    .artifact-reset {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      letter-spacing: 0.1em;
      color: var(--ink-dim);
      background: transparent;
      border: 1px solid rgba(var(--rgb-3), 0.4);
      border-radius: 8px;
      padding: 0.25rem 0.5rem;
      cursor: pointer;
      transition: color 0.18s, border-color 0.18s, box-shadow 0.18s;
    }
    .artifact-reset:hover {
      color: var(--glow-magenta);
      border-color: var(--glow-magenta);
      box-shadow: 0 0 12px rgba(var(--rgb-2), 0.3);
    }

    .pulse-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--glow-cyan);
      box-shadow: 0 0 10px var(--glow-cyan), 0 0 20px var(--glow-cyan);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: 1;   }
      50%      { transform: scale(1.5); opacity: 0.45; }
    }

    /* ============ Stream / thread ============ */
    .artifact-stream {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      scrollbar-width: thin;
      scrollbar-color: var(--glow-violet) transparent;
    }
    .artifact-stream::-webkit-scrollbar { width: 8px; }
    .artifact-stream::-webkit-scrollbar-thumb {
      background: rgba(var(--rgb-3), 0.5);
      border-radius: 8px;
    }

    .bubble {
      max-width: 82%;
      padding: 0.7rem 0.95rem;
      font-size: var(--msg-size, 0.95rem);
      line-height: 1.5;
      border-radius: 16px;
      white-space: pre-wrap;
      word-wrap: break-word;
      animation: rise 0.28s ease;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* User: glowing cyan, right-aligned */
    .bubble.user {
      align-self: flex-end;
      background: var(--bubble-user);
      border: 1px solid rgba(var(--rgb-1), 0.55);
      color: var(--ink-hi-1);
      box-shadow: 0 0 14px rgba(var(--rgb-1), 0.18);
      border-bottom-right-radius: 4px;
    }

    /* Bot: dark magenta, left-aligned */
    .bubble.bot {
      align-self: flex-start;
      background: var(--bubble-bot);
      border: 1px solid rgba(var(--rgb-2), 0.5);
      color: var(--ink-hi-2);
      box-shadow: 0 0 14px rgba(var(--rgb-2), 0.16);
      border-bottom-left-radius: 4px;
    }

    .bubble.system {
      align-self: center;
      background: rgba(var(--rgb-3), 0.10);
      border: 1px dashed rgba(var(--rgb-3), 0.45);
      color: var(--ink-dim);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      text-align: center;
    }

    /* ============ Typing indicator ============ */
    .typing {
      align-self: flex-start;
      display: none;
      align-items: center;
      gap: 5px;
      padding: 0.7rem 0.95rem;
      background: var(--bubble-bot);
      border: 1px solid rgba(var(--rgb-2), 0.4);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }
    .typing.is-active { display: inline-flex; }
    .typing-spiral {
      width: 22px;
      height: 22px;
      transform-origin: 50% 50%;
      animation: spiral-spin 1.1s linear infinite;
      filter: drop-shadow(0 0 4px var(--glow-magenta));
    }
    .typing-spiral path {
      stroke: var(--glow-magenta);
      stroke-width: 1.6;
      stroke-linecap: round;
      fill: none;
    }
    @keyframes spiral-spin {
      to { transform: rotate(360deg); }
    }

    /* ============ Toolbar ============ */
    .artifact-toolbar {
      display: flex;
      gap: 0.6rem;
      padding: 0.85rem;
      border-top: 1px solid rgba(var(--rgb-1), 0.22);
      background: rgba(var(--rgb-bg0), 0.55);
    }

    .artifact-input {
      flex: 1 1 auto;
      min-width: 0;
      padding: 0.8rem 1rem;
      font-family: 'Space Grotesk', var(--font-sans);
      font-size: 0.95rem;
      color: var(--ink);
      background: rgba(var(--rgb-bg1), 0.8);
      border: 1px solid rgba(var(--rgb-3), 0.4);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .artifact-input::placeholder { color: var(--ink-dim); }
    .artifact-input:focus {
      border-color: var(--glow-cyan);
      box-shadow: 0 0 0 1px var(--glow-cyan), 0 0 16px rgba(var(--rgb-1), 0.25);
    }
    .artifact-toolbar.is-locked .artifact-input {
      border-color: rgba(var(--rgb-2), 0.55);
      letter-spacing: 0.18em;
      /* NOTE: no -webkit-text-security here. It visually masked the passphrase
         but iOS/WebKit treats a text-security field as a PASSWORD field — which
         popped the AutoFill "Passwords" accessory (raising the keyboard) and got
         a credential saved for the domain that then haunted the chat input. A
         plain text field keeps iOS from ever treating this as a login. */
    }
    .artifact-toolbar.is-locked .artifact-input:focus {
      border-color: var(--glow-magenta);
      box-shadow: 0 0 0 1px var(--glow-magenta), 0 0 16px rgba(var(--rgb-2), 0.3);
    }

    .artifact-send {
      flex: 0 0 auto;
      padding: 0 1.25rem;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--on-accent);
      background: linear-gradient(135deg, var(--glow-cyan), var(--glow-magenta));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(var(--rgb-1), 0.4);
      transition: transform 0.12s, box-shadow 0.18s, opacity 0.18s;
    }
    .artifact-send:hover { box-shadow: 0 0 26px rgba(var(--rgb-2), 0.55); }
    .artifact-send:active { transform: scale(0.96); }
    .artifact-send:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

    /* ============ Mic / dictation button ============ */
    .artifact-mic {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 46px;
      padding: 0;
      color: var(--glow-cyan);
      background: rgba(var(--rgb-bg1), 0.8);
      border: 1px solid rgba(var(--rgb-1), 0.45);
      border-radius: 12px;
      cursor: pointer;
      transition: color 0.18s, background 0.18s, border-color 0.18s, box-shadow 0.18s, transform 0.12s;
    }
    .artifact-mic:hover { box-shadow: 0 0 16px rgba(var(--rgb-1), 0.35); }
    .artifact-mic:active { transform: scale(0.96); }
    .artifact-mic svg { width: 20px; height: 20px; }
    /* Listening: solid neon cyan, gently pulsing. */
    .artifact-mic.is-listening {
      color: var(--on-accent);
      background: var(--glow-cyan);
      border-color: var(--glow-cyan);
      animation: mic-pulse 1.3s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(var(--rgb-1), 0.5); }
      50%      { box-shadow: 0 0 18px 5px rgba(var(--rgb-1), 0.6); }
    }

    /* ============ Per-bubble replay (read aloud) ============ */
    .bubble-text { white-space: pre-wrap; word-wrap: break-word; }
    .bubble-replay {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      width: 22px;
      height: 22px;
      margin-left: 0.5rem;
      padding: 0;
      color: var(--glow-magenta);
      background: transparent;
      border: 1px solid rgba(var(--rgb-2), 0.5);
      border-radius: 50%;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.18s, color 0.18s, border-color 0.18s, box-shadow 0.18s;
    }
    .bubble-replay:hover { opacity: 1; box-shadow: 0 0 12px rgba(var(--rgb-2), 0.45); }
    .bubble-replay svg { width: 11px; height: 11px; }
    /* While this bubble is being spoken aloud, flip it to cyan. */
    .bubble-replay.is-speaking {
      opacity: 1;
      color: var(--glow-cyan);
      border-color: var(--glow-cyan);
      box-shadow: 0 0 12px rgba(var(--rgb-1), 0.5);
    }

    /* ============ Tuning console (persona tuner) ============ */
    /* Header toggle button carries an icon; size it to match LOCK/RESET. */
    .artifact-reset svg { width: 15px; height: 15px; display: block; }
    .artifact-tune.is-open {
      color: var(--glow-cyan);
      border-color: var(--glow-cyan);
      box-shadow: 0 0 12px rgba(var(--rgb-1), 0.35);
    }

    /* Dropdown OVERLAY anchored under the header — floats over the chat instead
       of reflowing it, so it always appears cleanly above the conversation and
       the answer/input never get shoved around. --header-h is measured in JS. */
    .tuner {
      position: absolute;
      top: var(--header-h, 56px);
      left: 0;
      right: 0;
      z-index: 40;
      background: rgba(var(--rgb-bg1), 0.97);
      -webkit-backdrop-filter: blur(10px) saturate(140%);
      backdrop-filter: blur(10px) saturate(140%);
      border-bottom: 1px solid rgba(var(--rgb-3), 0.32);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.55);
      transform: translateY(-12px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.26s ease, transform 0.26s ease, visibility 0.26s ease;
    }
    .tuner.is-open {
      transform: translateY(0);
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .tuner-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem 1.1rem;
    }

    .tuner-row { display: flex; flex-direction: column; gap: 0.45rem; }
    .tuner-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.6rem;
    }
    .tuner-name {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--ink-dim);
    }
    .tuner-val {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent, var(--glow-cyan));
      text-shadow: 0 0 10px var(--accent, var(--glow-cyan));
      min-width: 3.2ch;
      text-align: right;
    }

    /* Neon range slider. --accent (per row) tints fill + thumb glow;
       --fill (set in JS) is the filled percentage of the track. */
    .tuner-range {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 4px;
      background:
        linear-gradient(90deg,
          var(--accent, var(--glow-cyan)) 0%,
          var(--accent, var(--glow-cyan)) var(--fill, 50%),
          rgba(var(--rgb-3), 0.18) var(--fill, 50%),
          rgba(var(--rgb-3), 0.18) 100%);
      outline: none;
      cursor: pointer;
    }
    .tuner-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent, var(--glow-cyan));
      border: 2px solid var(--on-accent);
      box-shadow: 0 0 8px var(--accent, var(--glow-cyan)),
                  0 0 16px var(--accent, var(--glow-cyan));
      cursor: pointer;
    }
    .tuner-range::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent, var(--glow-cyan));
      border: 2px solid var(--on-accent);
      box-shadow: 0 0 8px var(--accent, var(--glow-cyan));
      cursor: pointer;
    }
    .tuner-range:focus-visible::-webkit-slider-thumb {
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.25),
                  0 0 16px var(--accent, var(--glow-cyan));
    }

    /* Quick presets — one-tap slider combos, each tinted by its --accent so it
       echoes the neon track colours. Sits above the sliders inside the panel. */
    .tuner-presets {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.1rem 0;
    }
    .tuner-preset {
      flex: 1 1 0;
      min-width: 0;
      font-family: var(--font-mono);
      font-size: 0.66rem;
      letter-spacing: 0.04em;
      line-height: 1.15;
      color: var(--ink-dim);
      text-align: center;
      padding: 0.5rem 0.35rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(var(--rgb-3), 0.22);
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease,
                  box-shadow 0.2s ease, background 0.2s ease;
    }
    .tuner-preset:hover {
      color: var(--accent, var(--glow-cyan));
      border-color: var(--accent, var(--glow-cyan));
    }
    .tuner-preset.is-active {
      color: var(--accent, var(--glow-cyan));
      border-color: var(--accent, var(--glow-cyan));
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 12px -2px var(--accent, var(--glow-cyan));
      text-shadow: 0 0 8px var(--accent, var(--glow-cyan));
    }

    /* ============ Boot splash / intro ============ */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.6rem;
      background:
        radial-gradient(ellipse 120% 80% at 50% 42%, rgba(var(--rgb-3), 0.24), transparent 60%),
        radial-gradient(ellipse 90% 60% at 90% 110%, rgba(var(--rgb-2), 0.12), transparent 55%),
        linear-gradient(180deg, var(--bg-1), var(--bg-0));
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }
    .intro.is-hidden { opacity: 0; visibility: hidden; }

    .intro-word {
      font-family: var(--font-mono);
      font-size: clamp(2rem, 12vw, 5rem);
      font-weight: 600;
      letter-spacing: 0.32em;
      text-indent: 0.32em; /* offset trailing letter-spacing → stays centered */
      background: linear-gradient(135deg, var(--glow-cyan), var(--glow-magenta));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 18px rgba(var(--rgb-1), 0.45))
              drop-shadow(0 0 36px rgba(var(--rgb-2), 0.30));
      animation: intro-flicker 2.6s ease-in-out infinite;
    }
    @keyframes intro-flicker {
      0%, 100% { opacity: 1;    }
      48%      { opacity: 0.78; }
      50%      { opacity: 0.95; }
      52%      { opacity: 0.78; }
    }

    .intro-bar {
      width: min(220px, 52vw);
      height: 2px;
      background: rgba(var(--rgb-3), 0.22);
      border-radius: 2px;
      overflow: hidden;
    }
    .intro-bar::after {
      content: "";
      display: block;
      height: 100%;
      width: 100%;
      transform-origin: left center;
      background: linear-gradient(90deg, var(--glow-cyan), var(--glow-magenta));
      box-shadow: 0 0 12px rgba(var(--rgb-1), 0.6);
      animation: intro-load 5s linear forwards;
    }
    @keyframes intro-load {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    @media (max-width: 480px) {
      /* Lock the page so it can't "float" / scroll loose behind the chat. */
      html, body { height: 100%; overflow: hidden; }
      body { padding: 0; }
      .artifact {
        position: fixed;
        /* Anchor only the TOP — NOT bottom. Pinning bottom (inset:0) forces
           full layout-viewport height and makes the browser ignore the height
           below, leaving the input hidden behind the keyboard. --app-top tracks
           visualViewport.offsetTop so when the keyboard scrolls the visual
           viewport down, the whole chat follows and the input stays visible
           (without it, top:0 kept the chat pinned above the visible area). */
        top: var(--app-top, 0px);
        left: 0;
        right: 0;
        /* Height = the REAL visible viewport (set in JS from visualViewport),
           so when the keyboard opens the container shrinks and the input stays
           just above it. Falls back to 100svh/100dvh until JS runs. */
        height: 100svh;
        height: var(--app-height, 100dvh);
        max-width: 100%;
        border-radius: 0;
        border-left: none;
        border-right: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .pulse-dot, .typing-spiral, .bubble, .intro-word, .artifact-mic.is-listening { animation: none; }
      /* Keep the bar filled (still acts as a visible boot indicator). */
      .intro-bar::after { animation: none; transform: scaleX(1); }
    }
  </style>
  <!-- Apply the saved skin BEFORE first paint so there's no vault→neon flash.
       Vault is the DEFAULT skin: applied unless the user explicitly chose neon. -->
  <script>

    } catch (e) {
      document.documentElement.setAttribute('data-skin', 'vault');
    }
  </script>

    <form class="artifact-toolbar" id="toolbar" autocomplete="off">
      <input
        class="artifact-input"
        id="input"
        type="text"
        name="artifact-message"
        placeholder="Invoke the Artifact..."
        aria-label="Message the Artifact"
        maxlength="4000"
        enterkeyhint="send"

      <button class="artifact-mic" id="mic" type="button" title="Dictate (speech to text)" aria-label="Dictate your message">

          <rect x="9" y="2.5" width="6" height="11" rx="3"></rect>

  </main>

  <script>
    // ===== Abstraction layer =====================================
    // The front-end talks ONLY to this proxy Worker. No API keys,
    // no secrets ever live in this file. The Worker is responsible
    // for calling the model provider and — on the future roadmap —
    // routing each exchange to a Google Sheets archive via Apps Script.
    const API_URL = "https://artifact-engine.avatar68.workers.dev/api/chat";

    const stream  = document.getElementById('stream');
    const typing  = document.getElementById('typing');
    const form    = document.getElementById('toolbar');
    const input   = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const resetBtn = document.getElementById('reset');
    const lockBtn = document.getElementById('lock');

    // Replay-button glyphs: ▶ when idle, ■ while this bubble is being read.
    const PLAY_ICON = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>';
    const STOP_ICON = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';

    // Touch devices (iPhone): never programmatically pop the keyboard — let the
    // user tap the field themselves. focusInput() is therefore a no-op on touch,
    // which stops the input from "doing its own thing" during voice turns.
    const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    function focusInput() { if (!isTouch) input.focus(); }

    // ===== Access gate ===========================================
    // The chat is locked until the passphrase is entered. The passphrase is
    // NEVER stored in this file — it is validated server-side by the engine,
    // so the gate can't be bypassed by reading the source or hitting the
    // Worker directly. Previous conversations stay visible while locked.
    const KEY_STORE = 'artifact.key';
    let passphrase = readKey();
    let unlocked = !!passphrase;
    // While locked, the passphrase is masked as it's typed — but WITHOUT making
    // this a password field. The input stays type="text" (so iOS never treats it
    // as a credential / never pops the AutoFill bar — see applyLockUI + the CSS
    // note); we keep the real characters here in `lockedEntry` and paint bullets
    // into the visible field. type=password / -webkit-text-security stay banned.
    let lockedEntry = '';
    const MASK_CHAR = '•';

    function readKey() {
      try { return sessionStorage.getItem(KEY_STORE) || ''; } catch { return ''; }
    }

    function applyLockUI() {
      // The input is ALWAYS a plain type="text" field — no password type and no
      // -webkit-text-security masking. Either of those makes iOS treat it as a
      // credential (AutoFill bar raises the keyboard; a saved password then
      // haunts the chat input). While locked the passphrase is still dot-masked,
      // but in JS (see maskLockedInput / lockedEntry) so the field never becomes
      // a real credential field; magenta border + UNLOCK button also signal it.
      if (unlocked) {
        input.placeholder = persona === 'dion' ? 'Ask Dion, agápi mou...' : 'Invoke the Artifact...';
        sendBtn.textContent = 'SEND';
        lockBtn.style.display = '';
        form.classList.remove('is-locked');
      } else {
        input.placeholder = '🔒 Type the passphrase to unlock...';
        sendBtn.textContent = 'UNLOCK';
        lockBtn.style.display = 'none';
        form.classList.add('is-locked');
      }
    }

    async function verifyPassphrase(pass) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ verify: true, passphrase: pass })
      });
      return res.ok;
    }

    function lock(message) {
      unlocked = false;
      passphrase = '';
      lockedEntry = '';
      input.value = '';
      try { sessionStorage.removeItem(KEY_STORE); } catch {}
      applyLockUI();
      if (message) addBubble(message, 'system');
      focusInput();
    }

    // ===== Persona ================================================
    // Two voices share this UI: the default 'gemma' (The Artifact) and 'dion'
    // (the Mykonos concierge). Typing the bare word DION or GEMMA while unlocked
    // flips between them — no model call is spent on the switch. The active
    // persona rides along in every request so the engine picks the right system
    // prompt. Each persona keeps its OWN transcript (separate localStorage key),
    // so the conversations never bleed into each other.
    const PERSONA_KEY = 'artifact.persona.v1';
    function loadPersona() {
      try { return localStorage.getItem(PERSONA_KEY) === 'dion' ? 'dion' : 'gemma'; }
      catch { return 'gemma'; }
    }
    let persona = loadPersona();
    // gemma keeps the original key so existing memory survives; dion gets its own.
    function storeKeyFor(p) { return p === 'dion' ? 'artifact.history.dion.v1' : 'artifact.history.v1'; }

    // ===== Long-term memory (Gemma + OWNER only) =================
    // A small, curated set of facts the user pins ("θυμήσου …"). These now live
    // SERVER-SIDE in the Sheet "Memory" tab (durable, cross-device, owner-only) —
    // every op (add/list/forget) is routed through the engine, which gates on the
    // owner passphrase and is the only thing holding the Sheet token. The engine
    // reads the same list back into Gemma's system prompt on every owner turn.
    // `memory` here is just a local DISPLAY cache, refreshed from each response.
    const MEMORY_KEY = 'artifact.memory.gemma.v1';
    const MEMORY_MAX = 100;        // max pinned facts
    const MEMORY_FACT_MAX = 500;   // max chars per fact
    function loadMemory() {
      try { const a = JSON.parse(localStorage.getItem(MEMORY_KEY) || '[]'); return Array.isArray(a) ? a : []; }
      catch { return []; }
    }
    let memory = loadMemory();
    function saveMemory() {
      try { localStorage.setItem(MEMORY_KEY, JSON.stringify(memory)); } catch { /* storage full/off */ }
    }
    // Normalise a pinned fact the same way regardless of phrasing.
    function cleanFact(fact) {
      return (fact || '').trim().replace(/\s+/g, ' ')
        .replace(/^(?:ότι|οτι|πως|πώς|that)\s+/i, '')   // "θυμήσου ότι X" → "X"
        .slice(0, MEMORY_FACT_MAX);
    }
    // Route a memory op to the engine. Returns the parsed response (with the
    // canonical list) or null if the session got locked. Refreshes the cache.
    async function memoryOp(op) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ passphrase, persona: 'gemma', memoryOp: op })
      });
      if (res.status === 401) { lock('🔒 Session locked — enter the passphrase again.'); return null; }
      const data = await res.json().catch(() => ({}));
      if (Array.isArray(data.memory)) { memory = data.memory; saveMemory(); }
      return data;
    }
    // One-time lift of any pre-existing per-device facts up to the shared Sheet,
    // so nothing pinned before this change is lost. Guarded by a localStorage flag.
    async function migrateMemoryOnce() {
      const FLAG = 'artifact.memory.migrated.v1';
      try { if (localStorage.getItem(FLAG)) return; } catch {}
      if (!unlocked || persona !== 'gemma' || !memory.length) return;
      const data = await memoryOp({ type: 'import', facts: memory });
      if (data && Array.isArray(data.memory)) { try { localStorage.setItem(FLAG, '1'); } catch {} }
    }

    // ===== Reference documents (Drive "Artifact" folder, owner-only) =====
    // Two tiers inside the Drive "Artifact" folder:
    //   Profile/ — ALWAYS folded in by the engine (Global Context); nothing to
    //     toggle here, /my_profile just shows which files it contains.
    //   Library/ — selective: /lib lists it numbered, /read N[+M] loads the
    //     chosen files into THIS conversation (replace), /read off unloads.
    // libSelection holds the names currently loaded; sent as libFiles on each
    // Gemma turn. In-memory (resets on reload) so the token cost stays opt-in.
    // libIndex is the last /lib listing (number → name) so /read can resolve it.
    let libSelection = [];
    let libIndex = [];

    // The command directory shown by /dir — a single source of truth for every
    // owner command. Kept here (front-end) on purpose: it must NOT live in the
    // always-on Drive profile (that bloats the prompt and slows every turn).
    const COMMANDS_HELP = [
      '⌘ ΕΝΤΟΛΕΣ — The Artifact',
      '',
      'ΜΝΗΜΗ (μόνιμα facts, cross-device)',
      '• θυμήσου … / remember … — αποθηκεύει ένα fact',
      '• /memory (μνήμη) — λίστα αποθηκευμένων, αριθμημένα',
      '• /forget N (σβήσε 2) — σβήνει το #N',
      '• /forget (ξέχασέ τα, /forget all) — καθαρίζει όλη τη μνήμη',
      '',
      'PROFILE & ΒΙΒΛΙΟΘΗΚΗ (Drive: Artifact/Profile + Artifact/Library)',
      '• /my_profile (προφίλ) — δείχνει τα αρχεία του Profile (διαβάζονται πάντα)',
      '• /lib (βιβλιοθήκη) — αριθμημένη λίστα της βιβλιοθήκης',
      '• /read 1 · /read 1+2 · /read 1-3 · /read all — φορτώνει αρχεία στην κουβέντα',
      '• /read off — ξεφορτώνει τη βιβλιοθήκη',
      '',
      'ΑΝΑΖΗΤΗΣΗ ΣΤΟ ΙΝΤΕΡΝΕΤ (μία απάντηση, μόνο Gemma)',
      '• Ξεκίνα με: ψάξε… / γκουγκλάρισε… / search…',
      '• Ή φράση: «…στο ίντερνετ», «google it», «look it up»',
      '',
      'ΦΩΝΕΣ / PERSONA',
      '• DION — concierge Μυκόνου  ·  GEMMA — επιστροφή στο Artifact',
      '• /voices (φωνές) — τι φωνές TTS εκθέτει η συσκευή',
      '',
      '• /dir (εντολές) — αυτή η λίστα',
    ].join('\n');

    async function driveOp(op) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ passphrase, persona: 'gemma', driveOp: op })
      });
      if (res.status === 401) { lock('🔒 Session locked — enter the passphrase again.'); return null; }
      return res.json().catch(() => ({}));
    }
    // Shared owner/unconfigured/auth error rendering for any drive op. Returns
    // true (and shows a bubble) if the op failed; false if it's good to use.
    function driveOpError(data) {
      if (data.error === 'forbidden') { addBubble('📁 Τα αρχεία είναι μόνο για τον owner.', 'system'); return true; }
      if (data.error === 'drive-unconfigured') { addBubble('📁 Δεν είναι ρυθμισμένη η πρόσβαση στο Drive (λείπει το engine setup).', 'system'); return true; }
      if (!data.ok) { addBubble('📁 Drive error: ' + (data.error || 'άγνωστο') + '\n(Συνήθως λείπει το authorization — τρέξε τη συνάρτηση driveList στον Apps Script editor και κάνε Allow.)', 'system'); return true; }
      return false;
    }

    // /my_profile — show the always-on Profile files (Global Context).
    async function showProfile() {
      const data = await driveOp({ type: 'list' });
      if (!data || driveOpError(data)) return;
      if (!data.folderFound) { addBubble('📌 Δεν βρήκα υποφάκελο «Profile» μέσα στο «Artifact». Φτιάξ’ τον και βάλε εκεί το προφίλ σου.', 'system'); return; }
      const files = (data.files || []).filter((f) => f && f.name);
      if (!files.length) { addBubble('📌 Ο υποφάκελος «Profile» είναι άδειος.', 'system'); return; }
      addBubble('📌 Profile — Global Context (διαβάζεται ΠΑΝΤΑ, ' + files.length + '):\n'
        + files.map((f, i) => (i + 1) + '. ' + f.name).join('\n')
        + '\n\n(Μόνο Docs/txt/md/csv διαβάζονται — PDF/εικόνες όχι.)', 'system');
    }

    // /lib — numbered Library listing (like /memory); remembers order for /read.
    async function listLibrary() {
      const data = await driveOp({ type: 'lib-list' });
      if (!data || driveOpError(data)) return;
      if (!data.folderFound) { addBubble('📚 Δεν βρήκα υποφάκελο «Library» μέσα στο «Artifact».', 'system'); return; }
      const files = (data.files || []).filter((f) => f && f.name);
      libIndex = files.map((f) => f.name);
      if (!files.length) { addBubble('📚 Η βιβλιοθήκη είναι άδεια.', 'system'); return; }
      const loaded = libSelection.length ? '\n\nΦορτωμένα τώρα: ' + libSelection.join(', ') : '';
      addBubble('📚 Βιβλιοθήκη (' + files.length + '):\n'
        + files.map((f, i) => (i + 1) + '. ' + f.name).join('\n')
        + '\n\n(«/read 1» ή «/read 1+2» για διάβασμα, «/read off» για κανένα.)' + loaded, 'system');
    }

    // Parse /read: "/read", "/read off|all", "/read 1", "/read 1+2", "1,2", "1-3".
    // Bare "read …"/"διάβασε …" only counts when followed by a number/keyword, so
    // a normal sentence ("read this for me") isn't swallowed as a command.
    function parseReadCommand(value) {
      let m = value.match(/^\s*\/read\b\s*(.*)$/i);
      if (!m) m = value.match(/^\s*(?:read|διάβασε|διαβασε)\s+(\d[\d\s+,\-]*|all|όλα|ολα|off|none|κανένα|κανενα)\s*$/i);
      if (!m) return null;
      const arg = (m[1] || '').trim().toLowerCase();
      if (!arg) return { type: 'prompt' };
      if (/^(off|none|κανένα|κανενα)$/.test(arg)) return { type: 'off' };
      if (/^(all|όλα|ολα)$/.test(arg)) return { type: 'all' };
      const nums = parseIndexList(arg);
      return nums.length ? { type: 'nums', nums } : { type: 'prompt' };
    }
    // "1 2", "1+2", "1,2", "1-3" → a deduped list of 1-based indices.
    function parseIndexList(s) {
      const out = [];
      s.split(/[+,\s]+/).forEach((tok) => {
        const range = tok.match(/^(\d+)-(\d+)$/);
        if (range) {
          let a = +range[1], b = +range[2];
          if (a > b) { const t = a; a = b; b = t; }
          for (let i = a; i <= b; i++) out.push(i);
        } else if (/^\d+$/.test(tok)) out.push(+tok);
      });
      return [...new Set(out)];
    }

    async function runRead(cmd) {
      if (cmd.type === 'off') {
        if (!libSelection.length) { addBubble('📚 Δεν ήταν φορτωμένο κανένα αρχείο.', 'system'); return; }
        libSelection = [];
        addBubble('📚 Ξεφόρτωσα τη βιβλιοθήκη από την κουβέντα.', 'system');
        return;
      }
      if (cmd.type === 'prompt') { addBubble('📚 Πες «/read 1» ή «/read 1+2». «/lib» για τη λίστα.', 'system'); return; }
      // Make sure we have the numbering (the last /lib listing); fetch if needed.
      if (!libIndex.length) {
        const data = await driveOp({ type: 'lib-list' });
        if (!data || driveOpError(data)) return;
        if (!data.folderFound) { addBubble('📚 Δεν βρήκα υποφάκελο «Library».', 'system'); return; }
        libIndex = (data.files || []).filter((f) => f && f.name).map((f) => f.name);
      }
      if (!libIndex.length) { addBubble('📚 Η βιβλιοθήκη είναι άδεια.', 'system'); return; }

      let names;
      if (cmd.type === 'all') names = libIndex.slice();
      else {
        names = [];
        const bad = [];
        cmd.nums.forEach((n) => { const nm = libIndex[n - 1]; if (nm) names.push(nm); else bad.push(n); });
        if (!names.length) { addBubble('📚 Δεν υπάρχει αρχείο με αυτόν τον αριθμό. «/lib» για τη λίστα.', 'system'); return; }
        if (bad.length) addBubble('📚 Αγνόησα ανύπαρκτους αριθμούς: ' + bad.join(', ') + '.', 'system');
      }

      const data = await driveOp({ type: 'lib-read', names });
      if (!data || driveOpError(data)) return;
      const read = Array.isArray(data.read) ? data.read : [];
      if (!read.length) {
        addBubble('📚 Δεν μπόρεσα να διαβάσω κείμενο από αυτά (ίσως PDF/εικόνα — δεν εξάγονται). Τίποτα δεν φορτώθηκε.', 'system');
        return;
      }
      libSelection = read;   // replace (not additive)
      const skipped = names.filter((n) => !read.includes(n));
      addBubble('✅ Διάβασα (' + read.length + '): ' + read.join(', ')
        + (skipped.length ? '\n(Παράλειψα — δεν εξάγεται κείμενο: ' + skipped.join(', ') + ')' : '')
        + '\nΘα τα έχω υπόψη σε αυτή την κουβέντα. («/read off» για να τα ξεφορτώσω.)', 'system');
    }

    // Memory commands (Gemma only). Returns a command object or null.
    function parseMemoryCommand(value) {
      // NB: \b is unreliable with Greek (non-ASCII isn't a JS \w), so we use a
      // lookahead for a separator/end instead — works for Greek and English.
      var add = value.match(/^\s*(?:\/remember|remember|θυμ[ήη]σου|να\s+θυμ[άα]σαι)(?=[\s:：,—–-]|$)[\s:：,—–-]*(.+)$/is);
      if (add && add[1].trim()) return { type: 'add', fact: add[1] };
      if (/^\s*\/?(?:memory|μν[ήη]μη)\s*[?;]?\s*$/i.test(value)) return { type: 'list' };
      // forget: optional argument. A number → drop just that one; "all"/"τα"/
      // "όλα"/"τη μνήμη"/nothing → clear everything.
      var forget = value.match(/^\s*\/?(?:forget|ξ[έε]χασ[έε]?|σβ[ήη]σε)(?:\s+(all|τα|όλα|ολα|τη\s+μν[ήη]μη|\d+))?\s*$/i);
      if (forget) {
        var arg = forget[1] || '';
        var idx = /^\d+$/.test(arg) ? parseInt(arg, 10) : null;
        return { type: 'forget', index: idx };
      }
      return null;
    }
    // Common error rendering for any memory op (owner gate / unconfigured engine).
    function memoryError(data) {
      if (!data) return true; // session locked — lock() already messaged
      if (data.error === 'forbidden') { addBubble('🧠 Η μνήμη είναι μόνο για τον owner.', 'system'); return true; }
      if (data.error === 'memory-unconfigured') { addBubble('🧠 Η μνήμη δεν είναι ρυθμισμένη ακόμη (λείπει το Sheet/engine setup).', 'system'); return true; }
      return false;
    }
    async function runMemoryCommand(cmd) {
      if (cmd.type === 'add') {
        const fact = cleanFact(cmd.fact);
        if (!fact) { addBubble('🧠 Δεν κατάλαβα τι να θυμηθώ — πες «θυμήσου …».', 'system'); return; }
        const data = await memoryOp({ type: 'add', fact });
        if (memoryError(data)) return;
        if (!data.ok) addBubble('🧠 Κάτι πήγε στραβά με τη μνήμη. Δοκίμασε ξανά.', 'system');
        else if (data.status === 'dup') addBubble('🧠 Το έχω ήδη στη μνήμη.', 'system');
        else if (data.status === 'empty') addBubble('🧠 Δεν κατάλαβα τι να θυμηθώ — πες «θυμήσου …».', 'system');
        else addBubble('🧠 Κράτησα στη μνήμη: “' + (data.fact || fact) + '”. Θα τη θυμάμαι και σε επόμενες κουβέντες — από οποιαδήποτε συσκευή.', 'system');
      } else if (cmd.type === 'list') {
        const data = await memoryOp({ type: 'list' });
        if (memoryError(data)) return;
        const list = Array.isArray(data.memory) ? data.memory : [];
        if (!list.length) addBubble('🧠 Η μνήμη είναι άδεια. Πες «θυμήσου …» για να προσθέσεις κάτι.', 'system');
        else addBubble('🧠 Θυμάμαι (' + list.length + '):\n' + list.map((m, i) => (i + 1) + '. ' + m).join('\n') + '\n\n(«/forget 2» σβήνει τη #2, «/forget» όλα.)', 'system');
      } else if (cmd.type === 'forget') {
        const data = await memoryOp(cmd.index != null ? { type: 'forget', index: cmd.index } : { type: 'clear' });
        if (memoryError(data)) return;
        if (cmd.index != null) {
          if (data.status === 'notfound') addBubble('🧠 Δεν υπάρχει μνήμη #' + cmd.index + '. («/memory» για τη λίστα.)', 'system');
          else addBubble('🧠 Έσβησα τη #' + cmd.index + ': “' + (data.fact || '') + '”.' + ((data.memory && data.memory.length) ? '' : ' Η μνήμη είναι πλέον άδεια.'), 'system');
        } else {
          addBubble('🧠 Καθάρισα όλη τη μνήμη.', 'system');
        }
      }
    }

    // ===== Transcript memory =====================================
    // The brains keep the full transcript and persist it in localStorage,
    // so the Artifact remembers the conversation across reloads. Every turn
    // the entire history is sent to the engine for true multi-turn context.
    let history = loadHistory();

    function loadHistory() {
      try {
        const raw = localStorage.getItem(storeKeyFor(persona));
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveHistory() {
      try {
        localStorage.setItem(storeKeyFor(persona), JSON.stringify(history));
      } catch { /* storage full / disabled — memory stays in-session only */ }
    }

    function addBubble(text, role) {
      const el = document.createElement('div');
      el.className = 'bubble ' + role;
      if (role === 'bot') {
        // Bot bubbles get a text span + a neon replay (read-aloud) button.
        // Keeping the text in its own span means the button glyph never
        // leaks into what we speak.
        const span = document.createElement('span');
        span.className = 'bubble-text';
        span.textContent = text;
        el.appendChild(span);

        const replay = document.createElement('button');
        replay.type = 'button';
        replay.className = 'bubble-replay';
        replay.title = 'Read aloud';
        replay.setAttribute('aria-label', 'Read this message aloud');
        replay.innerHTML = PLAY_ICON;
        // Toggle: play if idle, stop if this bubble is currently being read.
        // Read the span's CURRENT text (not the value at creation), so a bubble
        // that was filled in by streaming still speaks its full final answer.
        replay.addEventListener('click', () => {
          if (replay.classList.contains('is-speaking')) stopSpeak();
          else speak(span.textContent, replay);
        });
        el.appendChild(replay);
      } else {
        el.textContent = text;
      }
      stream.appendChild(el);
      stream.scrollTop = stream.scrollHeight;
      return el;
    }

    // Replay saved history on load (skip the static system greeting).
    history.forEach((m) => addBubble(m.text, m.role === 'model' ? 'bot' : 'user'));

    function setBusy(busy) {
      sendBtn.disabled = busy;
      input.disabled = busy;
      typing.classList.toggle('is-active', busy);
      typing.setAttribute('aria-hidden', String(!busy));
      if (busy) {
        stream.appendChild(typing); // keep indicator pinned to the bottom
        stream.scrollTop = stream.scrollHeight;
      }
    }

    // Stream the reply via Server-Sent Events. The engine sends `stream:true`
    // and emits `data: {"delta":"…"}` lines as tokens arrive, then
    // `data: {"done":true}`. onDelta runs for each chunk; the full text is
    // returned at the end. Falls back to reading the whole body at once on
    // browsers without fetch-stream support — same parser, just non-incremental.
    async function streamInvoke(onDelta) {
      // Send the FULL transcript (+ passphrase + persona + dials) so the engine
      // has context. `stream:true` opts into the SSE response.
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: history, passphrase, persona, stream: true, params: currentParams(),
          // Long-term memory is no longer sent from here — the engine reads the
          // owner's facts straight from the Sheet "Memory" tab (cross-device).
          // Library files the owner loaded with /read for this conversation.
          // (Profile is always-on engine-side, so nothing to send for it.)
          libFiles: persona === 'gemma' && libSelection.length ? libSelection : undefined
        })
      });

      if (res.status === 401) {
        const e = new Error('locked');
        e.locked = true;
        throw e;
      }
      if (res.status === 503) {
        // Kill switch is on — the engine is offline for everyone.
        const data = await res.json().catch(() => ({}));
        const e = new Error(data.reply || data.message || 'The Artifact is offline right now.');
        e.offline = true;
        throw e;
      }
      if (!res.ok) {
        throw new Error('Engine responded with status ' + res.status);
      }

      // Backward / fallback compatible: if the engine answered with plain JSON
      // (an older Worker that ignores `stream`, or any non-SSE reply), take the
      // whole reply at once instead of trying to parse it as an event stream.
      const ctype = res.headers.get('content-type') || '';
      if (!ctype.includes('text/event-stream')) {
        const data = await res.json().catch(() => ({}));
        // A kill/antidote phrase was matched server-side — signal the caller to
        // scrub it from the transcript instead of treating it as a reply.
        if (data.control) return { __control: data.control, ok: data.ok, killed: data.killed, error: data.error };
        const reply = data.reply || data.message || data.response || '(empty response)';
        onDelta(reply);
        return reply;
      }

      let full = '';
      // Parse one or more "\n\n"-separated SSE events out of a text buffer,
      // firing onDelta and accumulating. Returns the leftover partial tail.
      function drain(buf, flush) {
        let idx;
        while ((idx = buf.indexOf('\n\n')) >= 0) {
          const evt = buf.slice(0, idx);
          buf = buf.slice(idx + 2);
          const line = evt.split('\n').find((l) => l.startsWith('data:'));
          if (!line) continue;
          const payload = line.slice(5).trim();
          if (!payload) continue;
          let data;
          try { data = JSON.parse(payload); } catch { continue; }
          if (data.error) throw new Error(data.error);
          if (data.delta) { full += data.delta; onDelta(data.delta); }
          // data.done → stream finished; loop just ends naturally.
        }
        return buf;
      }

      if (res.body && typeof res.body.getReader === 'function') {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          buf = drain(buf);
        }
      } else {
        // No streaming reader — read it all, then parse in one pass.
        drain(await res.text() + '\n\n');
      }

      return full;
    }

    // The owner typed a secret KILL_SWITCH / ANTIDOTE phrase — the engine matched
    // it and toggled the kill flag instead of replying. Show the outcome.
    function showControlResult(r) {
      if (r.error === 'kv-missing') {
        addBubble('⚠️ Ο διακόπτης δεν είναι ρυθμισμένος (λείπει το KV namespace). Δες engine/README.', 'system');
      } else if (r.error) {
        addBubble('⚠️ Η ενέργεια δεν ολοκληρώθηκε.', 'system');
      } else if (r.killed) {
        addBubble('🔴 Engine OFFLINE για όλους. Γράψε τη φράση ANTIDOTE για επαναφορά.', 'system');
      } else {
        addBubble('🟢 Engine ONLINE ξανά.', 'system');
      }
    }

    async function handleSubmit(event) {
      event.preventDefault();
      // This runs inside a user gesture — unlock iOS speech output so the
      // Artifact's reply can be read aloud automatically when it arrives.
      unlockTTS();
      // While locked the visible field shows bullets — the real passphrase lives
      // in `lockedEntry` (fall back to input.value for the mic/programmatic path,
      // which sets the value directly and fires no input event).
      const value = (unlocked ? input.value : (lockedEntry || input.value)).trim();
      if (!value || sendBtn.disabled) return;

      // While locked, the entry is a passphrase attempt — not a message.
      if (!unlocked) {
        sendBtn.disabled = true;
        let ok = false;
        try { ok = await verifyPassphrase(value); } catch {}
        sendBtn.disabled = false;
        input.value = '';
        lockedEntry = '';
        if (ok) {
          passphrase = value;
          try { sessionStorage.setItem(KEY_STORE, passphrase); } catch {}
          unlocked = true;
          applyLockUI();
          addBubble('Access granted. Invoke the Artifact.', 'system');
          migrateMemoryOnce(); // owner just unlocked — lift any local facts to the Sheet
        } else {
          addBubble('🔒 Wrong passphrase — the chat stays locked.', 'system');
        }
        focusInput();
        return;
      }

      // Persona switch: the bare word DION / GEMMA (case-insensitive) is a
      // control command, not a message — flip voices and bail before sending.
      const cmd = value.toLowerCase();
      if (cmd === 'dion' || cmd === 'gemma') {
        input.value = '';
        switchPersona(cmd);
        focusInput();
        return;
      }

      // Diagnostic: /voices lists the TTS voices Safari actually exposes on this
      // device (iOS often hides downloaded enhanced/premium voices) and which one
      // pickVoice would choose. Handled locally, no model call.
      if (/^\/?\s*voices$/.test(cmd) || cmd === 'φωνές' || cmd === 'φωνες') {
        input.value = '';
        // iOS Safari loads voices lazily — getVoices() is often [] until the
        // engine is "warmed up". Nudge it, then retry for ~3s before reporting.
        unlockTTS();
        try { synth && synth.getVoices(); } catch {}
        let tries = 0;
        const renderVoices = () => {
          const all = synth ? synth.getVoices() : [];
          if (!all.length && tries < 12) { tries++; setTimeout(renderVoices, 250); return; }
          const list = all
            .filter((v) => /^(el|en)/i.test(v.lang || ''))
            .map((v) => `• ${v.name} [${v.lang}]${isPremiumVoice(v) ? ' ✓enhanced' : ''}`)
            .join('\n') || '(no el/en voices exposed)';
          const elPick = pickVoice('el-GR'), enPick = pickVoice('en-US');
          addBubble(
            `Voices exposed: ${all.length} total\n${list}\n\nGreek → ${elPick ? elPick.name : '—'}\nEnglish → ${enPick ? enPick.name : '—'}`,
            'system'
          );
        };
        renderVoices();
        focusInput();
        return;
      }

      // /dir — the command directory. A static, local listing of every owner
      // command (no model call, no engine round-trip) so the reference can't
      // bloat the always-on profile or slow a turn. Works in either persona.
      if (/^\/?\s*dir$/.test(cmd) || cmd === 'εντολές' || cmd === 'εντολες') {
        input.value = '';
        addBubble(COMMANDS_HELP, 'system');
        focusInput();
        return;
      }

      // Long-term memory commands — Gemma only, handled locally (no model call).
      if (persona === 'gemma') {
        const memCmd = parseMemoryCommand(value);
        if (memCmd) {
          input.value = '';
          runMemoryCommand(memCmd);
          focusInput();
          return;
        }
        // /my_profile — show the always-on Profile files (Global Context).
        const lc = value.trim().toLowerCase();
        if (/^\/?my[ _]?profile\b/.test(lc) || lc === 'προφίλ' || lc === 'το προφίλ μου') {
          input.value = '';
          await showProfile();
          focusInput();
          return;
        }
        // /lib — numbered Library listing.
        if (/^\/?lib\b/.test(lc) || lc === 'βιβλιοθήκη') {
          input.value = '';
          await listLibrary();
          focusInput();
          return;
        }
        // /read N[+M] — load selected Library files into this conversation.
        const readCmd = parseReadCommand(value);
        if (readCmd) {
          input.value = '';
          await runRead(readCmd);
          focusInput();
          return;
        }
      }

      // Tuning while chatting? Get the panel out of the way so it never sits
      // over the incoming answer.
      closeTuner();
      const message = value;
      const userEl = addBubble(message, 'user');
      history.push({ role: 'user', text: message });
      saveHistory();
      input.value = '';
      setBusy(true);

      let botEl = null, botSpan = null;
      try {
        const full = await streamInvoke((delta) => {
          if (!botEl) {
            // First token arrived: hide the typing dots, open the answer bubble.
            typing.classList.remove('is-active');
            typing.setAttribute('aria-hidden', 'true');
            botEl = addBubble('', 'bot');
            botSpan = botEl.querySelector('.bubble-text');
          }
          botSpan.textContent += delta;
          stream.scrollTop = stream.scrollHeight;
        });
        setBusy(false);

        // Secret kill/antidote phrase: the engine toggled instead of replying.
        // Scrub the phrase from the bubble + transcript so it isn't stored.
        if (full && typeof full === 'object' && full.__control) {
          if (userEl) userEl.remove();
          if (history.length && history[history.length - 1].role === 'user') {
            history.pop();
            saveHistory();
          }
          showControlResult(full);
          focusInput();
          return;
        }

        const finalText = full || '(empty response)';
        if (!botEl) botEl = addBubble(finalText, 'bot');           // nothing streamed
        else if (!full) botSpan.textContent = finalText;            // streamed empty
        history.push({ role: 'model', text: finalText });
        saveHistory();
        // Auto read-aloud the fresh reply (history replay never speaks).
        speak(finalText, botEl.querySelector('.bubble-replay'));
      } catch (err) {
        setBusy(false);
        if (err && err.locked) {
          // Engine rejected the passphrase — re-lock and ask again.
          lock('🔒 Session locked — enter the passphrase again.');
        } else if (err && err.offline) {
          // Kill switch active — show the engine's offline message calmly.
          addBubble(err.message, 'system');
        } else {
          // Systemic fallback — the engine stays graceful on any exception.
          addBubble(
            '// SIGNAL LOST — the Artifact could not be reached. Check the engine endpoint and try again.',
            'system'
          );
        }
        console.error('[Artifact] fetch failed:', err);
      }

      focusInput();
    }

    function handleReset() {
      history = [];
      saveHistory();
      // Clear all bubbles, then restore the system greeting.
      stream.innerHTML = '';
      addBubble('Memory wiped. Invoke the Artifact to begin anew.', 'system');
      focusInput();
    }

    function personaLabel(p) { return p === 'dion' ? 'Dion — Mykonos Concierge' : 'The Artifact'; }

    function switchPersona(target) {
      if (target === persona) {
        addBubble(`Already speaking with ${personaLabel(target)}.`, 'system');
        return;
      }
      try { stopSpeak(); } catch {}      // silence any in-flight read-aloud
      persona = target;
      try { localStorage.setItem(PERSONA_KEY, persona); } catch {}
      // Swap in the target persona's own transcript and repaint the window.
      history = loadHistory();
      stream.innerHTML = '';
      history.forEach((m) => addBubble(m.text, m.role === 'model' ? 'bot' : 'user'));
      applyLockUI();                      // refresh the placeholder to the new voice
      addBubble(target === 'dion'
        ? '✨ Concierge active — you are now speaking with Dion. (Type GEMMA to return.)'
        : 'Back with The Artifact. (Type DION for the Mykonos concierge.)', 'system');
    }

    // SEND button click + Enter keypress both submit via the form.
    form.addEventListener('submit', handleSubmit);
    resetBtn.addEventListener('click', handleReset);
    lockBtn.addEventListener('click', () => lock('🔒 Locked. Enter the passphrase to chat.'));

    // ===== Skin switch (visual only) =============================
    // Cycles the front-end skin. Pure presentation — no engine call,
    // no effect on persona/transcript/memory. Persisted per device.
    // The <head> bootstrap already applied the saved skin pre-paint.
    const SKIN_KEY = 'artifact.skin.v1';
    const SKINS = ['neon', 'vault'];
    const SKIN_LABEL = { neon: 'Neon', vault: 'Vault' };
    const skinBtn = document.getElementById('skin');
    function currentSkin() {
      const s = document.documentElement.getAttribute('data-skin');
      return SKINS.includes(s) ? s : 'neon';
    }
    function applySkin(name) {
      const skin = SKINS.includes(name) ? name : 'neon';
      // Default skin carries no attribute (keeps the DOM clean); others set it.
      if (skin === 'neon') document.documentElement.removeAttribute('data-skin');
      else document.documentElement.setAttribute('data-skin', skin);
      try { localStorage.setItem(SKIN_KEY, skin); } catch { /* storage off */ }
      const tc = document.getElementById('themeColor');
      if (tc) tc.setAttribute('content', skin === 'vault' ? '#0a0910' : '#0a0a16');
      if (skinBtn) {
        const next = SKINS[(SKINS.indexOf(skin) + 1) % SKINS.length];
        skinBtn.title = `Skin: ${SKIN_LABEL[skin]} — tap for ${SKIN_LABEL[next]}`;
        skinBtn.setAttribute('aria-label', `Switch skin (current: ${SKIN_LABEL[skin]})`);
      }
    }
    applySkin(currentSkin()); // sync the button label to the booted skin
    if (skinBtn) {
      skinBtn.addEventListener('click', () => {
        const i = SKINS.indexOf(currentSkin());
        applySkin(SKINS[(i + 1) % SKINS.length]);
      });
    }

    // ===== Voice: Text-to-Speech (read aloud) ====================
    const synth = window.speechSynthesis;
    let ttsUnlocked = false;
    let speakingBtn = null;

    // Match the spoken language to the text: Greek glyphs → el-GR, else en-US.
    function detectLang(text) {
      // Greek block (U+0370–U+03FF) or Greek Extended (U+1F00–U+1FFF) → Greek.
      return /[\u0370-\u03FF\u1F00-\u1FFF]/.test(text) ? 'el-GR' : 'en-US';
    }
    // Prefer Apple/Google "premium"/"enhanced" voices — their intonation is far
    // more natural than the default compact voices. We can't query gender (the
    // Web Speech API doesn't expose it), so we match the known-natural named
    // voices first: Samantha for English, Melina for Greek.
    // Ordered name preferences per language — best/desired voice first. Greek:
    // Nikos (male, enhanced) then Melina; English: male enhanced names then
    // Samantha. We can't query gender, so we match by these known names.
    const VOICE_NAMES = {
      el: [/nikos/i, /melina/i],
      en: [/aaron/i, /\btom\b/i, /daniel/i, /arthur/i, /samantha/i],
    };
    const PREMIUM_TAG = /premium|enhanced/i;
    function isPremiumVoice(v) {
      return !!v && (PREMIUM_TAG.test(v.voiceURI || '') || PREMIUM_TAG.test(v.name || ''));
    }
    function pickVoice(lang) {
      const voices = synth ? synth.getVoices() : [];
      const base = lang.split('-')[0];
      const norm = (v) => (v.lang || '').replace('_', '-');
      const inLang = voices.filter((v) => norm(v).toLowerCase().startsWith(base));
      const pool = inLang.length ? inLang : voices;
      const names = VOICE_NAMES[base] || [];
      // 1) a preferred name that's ALSO enhanced/premium (the ideal hit);
      for (const re of names) {
        const hit = pool.find((v) => re.test(v.name) && isPremiumVoice(v));
        if (hit) return hit;
      }
      // 2) a preferred name at any quality;
      for (const re of names) {
        const hit = pool.find((v) => re.test(v.name));
        if (hit) return hit;
      }
      // 3) any enhanced/premium in-language → exact locale → first available.
      return pool.find(isPremiumVoice)
          || pool.find((v) => norm(v) === lang)
          || pool[0]
          || null;
    }
    // iOS only allows speech after a user gesture; speaking an empty utterance
    // during a tap grants permission for later programmatic (auto-read) speech.
    function unlockTTS() {
      if (!synth || ttsUnlocked) return;
      try { synth.speak(new SpeechSynthesisUtterance('')); ttsUnlocked = true; } catch {}
    }
    // Reset a replay button back to its idle ▶ state.
    function resetBtnIcon(btn) {
      if (!btn) return;
      btn.classList.remove('is-speaking');
      btn.innerHTML = PLAY_ICON;
      btn.title = 'Read aloud';
      btn.setAttribute('aria-label', 'Read this message aloud');
    }
    // Stop any read-aloud in progress (used by the bubble's ■ toggle).
    function stopSpeak() {
      if (synth) synth.cancel();
      resetBtnIcon(speakingBtn);
      speakingBtn = null;
    }
    // Strip emojis & markdown punctuation before speaking so the TTS engine
    // doesn't stumble on symbols (pausing on "*"/">"/"#") or read emoji names
    // aloud. Sentence punctuation is kept — it drives natural prosody.
    function cleanForSpeech(text) {
      return String(text || '')
        .replace(/\p{Extended_Pictographic}/gu, '')   // emojis
        .replace(/[\u200D\uFE0F\u20E3]/g, "")           // ZWJ / variation selector / keycap
        .replace(/[*_`#>~|]/g, ' ')                   // markdown markers
        .replace(/\s+/g, ' ')                       // collapse whitespace
        .trim();
    }
    function speak(text, btn) {
      if (!synth) return;
      text = cleanForSpeech(text);
      if (!text) return;
      synth.cancel(); // stop any in-flight speech cleanly before starting
      resetBtnIcon(speakingBtn);
      speakingBtn = null;

      const u = new SpeechSynthesisUtterance(text);
      u.lang = detectLang(text);
      const v = pickVoice(u.lang);
      if (v) u.voice = v;
      // Slightly slower + slightly lower than default: a hair under 1.0 reads as
      // "considered" rather than rushed, and a gently lowered pitch keeps the
      // premium voice from sounding thin/screechy (without masculinising it).
      u.rate = 0.92;
      u.pitch = 0.9;

      if (btn) {
        speakingBtn = btn;
        btn.classList.add('is-speaking');
        btn.innerHTML = STOP_ICON;           // becomes a STOP button while reading
        btn.title = 'Stop';
        btn.setAttribute('aria-label', 'Stop reading');
        const clear = () => {
          resetBtnIcon(btn);
          if (speakingBtn === btn) speakingBtn = null;
        };
        u.onend = clear;
        u.onerror = clear;
      }
      synth.speak(u);
    }
    // Voices can load asynchronously — touch the list once they're ready.
    if (synth && typeof synth.onvoiceschanged !== 'undefined') {
      synth.onvoiceschanged = () => { pickVoice('el-GR'); };
    }
    // Stop speech if the page is hidden or navigated away from.
    window.addEventListener('pagehide', () => { if (synth) synth.cancel(); });
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && synth) synth.cancel();
    });

    // ===== Voice: Speech-to-Text (dictation) =====================
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const micBtn = document.getElementById('mic');
    let listening = false;

    if (SR) {
      const recognition = new SR();
      // Default to Greek — this is a Greek-first chat, and the browser locale
      // (often en on iOS) was making it transcribe Greek speech as English.
      recognition.lang = 'el-GR';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.continuous = false;

      function stopListeningUI() {
        listening = false;
        micBtn.classList.remove('is-listening');
      }

      recognition.addEventListener('result', (e) => {
        const transcript = Array.from(e.results)
          .map((r) => r[0].transcript)
          .join(' ')
          .trim();
        if (!transcript) return;
        input.value = transcript;
        // Auto-send through the existing form flow (handleSubmit → invoke).
        if (typeof form.requestSubmit === 'function') form.requestSubmit();
        else handleSubmit(new Event('submit'));
      });
      recognition.addEventListener('end', stopListeningUI);
      recognition.addEventListener('error', stopListeningUI);

      micBtn.addEventListener('click', () => {
        unlockTTS(); // same tap also unlocks read-aloud on iOS
        if (listening) { recognition.stop(); return; }
        try {
          listening = true;
          micBtn.classList.add('is-listening');
          recognition.start();
        } catch { stopListeningUI(); }
      });
    } else {
      // Dictation unavailable (e.g. iOS Safari) — hide the mic gracefully.
      micBtn.style.display = 'none';
    }

    // ===== Persona Tuner (sliders) ===============================
    const tuneBtn = document.getElementById('tune');
    const tuner   = document.getElementById('tuner');
    const PARAMS_KEY = 'artifact.params.v1';
    const sliders = {
      temperature: { el: document.getElementById('tempRange'), val: document.getElementById('tempVal'), fmt: (v) => Number(v).toFixed(1) },
      sarcasm:     { el: document.getElementById('sarcRange'), val: document.getElementById('sarcVal'), fmt: (v) => Math.round(v) + '%' },
      seriousness: { el: document.getElementById('serRange'),  val: document.getElementById('serVal'),  fmt: (v) => Math.round(v) + '%' },
    };

    // The values sent with every message (temperature 0–2, the rest 0–100).
    function currentParams() {
      return {
        temperature: parseFloat(sliders.temperature.el.value),
        sarcasm:     parseInt(sliders.sarcasm.el.value, 10),
        seriousness: parseInt(sliders.seriousness.el.value, 10),
      };
    }
    function saveParams() {
      try { localStorage.setItem(PARAMS_KEY, JSON.stringify(currentParams())); } catch {}
    }
    // Repaint one slider: live number + neon "filled" portion of the track.
    function refreshSlider(key) {
      const s = sliders[key];
      const min = parseFloat(s.el.min), max = parseFloat(s.el.max), v = parseFloat(s.el.value);
      const pct = max > min ? ((v - min) / (max - min)) * 100 : 0;
      s.el.style.setProperty('--fill', pct + '%');
      s.val.textContent = s.fmt(v);
    }

    // Restore saved values, then wire live updates.
    try {
      const saved = JSON.parse(localStorage.getItem(PARAMS_KEY) || '{}');
      if (saved && typeof saved === 'object') {
        if (Number.isFinite(saved.temperature)) sliders.temperature.el.value = saved.temperature;
        if (Number.isFinite(saved.sarcasm))     sliders.sarcasm.el.value     = saved.sarcasm;
        if (Number.isFinite(saved.seriousness)) sliders.seriousness.el.value = saved.seriousness;
      }
    } catch {}
    // One-tap presets — each sets all three sliders at once. The active button
    // lights up only while the live values still match it (cleared on any drag).
    const PRESETS = {
      brainstorm: { temperature: 1.9, sarcasm: 27, seriousness: 18 },
      mirror:     { temperature: 0.9, sarcasm: 72, seriousness: 54 },
      architect:  { temperature: 0.3, sarcasm: 0,  seriousness: 90 },
    };
    const presetBtns = Array.from(document.querySelectorAll('.tuner-preset'));
    function updateActivePreset() {
      const cur = currentParams();
      presetBtns.forEach((btn) => {
        const p = PRESETS[btn.dataset.preset];
        const match = p &&
          Math.abs(cur.temperature - p.temperature) < 0.05 &&
          cur.sarcasm === p.sarcasm &&
          cur.seriousness === p.seriousness;
        btn.classList.toggle('is-active', !!match);
      });
    }
    function applyPreset(name) {
      const p = PRESETS[name];
      if (!p) return;
      sliders.temperature.el.value = p.temperature;
      sliders.sarcasm.el.value     = p.sarcasm;
      sliders.seriousness.el.value = p.seriousness;
      Object.keys(sliders).forEach(refreshSlider);
      saveParams();
      updateActivePreset();
    }
    presetBtns.forEach((btn) => {
      btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
    });

    Object.keys(sliders).forEach((key) => {
      refreshSlider(key);
      sliders[key].el.addEventListener('input', () => { refreshSlider(key); saveParams(); updateActivePreset(); });
    });
    updateActivePreset();

    // The dropdown overlay anchors under the header — measure its height so the
    // panel always sits exactly below it (header height shifts with text/zoom).
    const headerEl = document.querySelector('.artifact-header');
    function setHeaderHeight() {
      if (headerEl) {
        document.documentElement.style.setProperty('--header-h', headerEl.offsetHeight + 'px');
      }
    }
    setHeaderHeight();
    window.addEventListener('resize', setHeaderHeight);
    window.addEventListener('orientationchange', setHeaderHeight);

    function setTuner(open) {
      tuner.classList.toggle('is-open', open);
      tuneBtn.classList.toggle('is-open', open);
      tuner.setAttribute('aria-hidden', String(!open));
      tuneBtn.setAttribute('aria-expanded', String(open));
    }
    function closeTuner() { setTuner(false); }

    tuneBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      setHeaderHeight(); // re-measure right before opening
      setTuner(!tuner.classList.contains('is-open'));
    });
    // Tap anywhere outside the panel (or the chat) closes it — keeps things tidy.
    document.addEventListener('click', (e) => {
      if (!tuner.classList.contains('is-open')) return;
      if (tuner.contains(e.target) || tuneBtn.contains(e.target)) return;
      closeTuner();
    });

    applyLockUI();
    // If we loaded already unlocked, push any pre-existing local facts to the Sheet.
    migrateMemoryOnce();

    // ===== iOS viewport fit ======================================
    // iOS Safari's dvh/svh units don't track the keyboard or the URL bar
    // reliably, which makes the chat "float" until you pinch + reload. We
    // instead pin the container to the actual visible viewport reported by
    // visualViewport, updating it whenever the keyboard or address bar moves.
    const vv = window.visualViewport;
    function setAppHeight() {
      const h = vv ? vv.height : window.innerHeight;
      // offsetTop = how far iOS scrolled the visual viewport down to fit the
      // keyboard; the fixed chat must shift by the same amount to stay on screen.
      const top = vv ? vv.offsetTop : 0;
      document.documentElement.style.setProperty('--app-height', h + 'px');
      document.documentElement.style.setProperty('--app-top', top + 'px');
    }
    setAppHeight();
    if (vv) {
      vv.addEventListener('resize', setAppHeight);
      vv.addEventListener('scroll', setAppHeight);
    }
    window.addEventListener('orientationchange', setAppHeight);

    // When the keyboard opens, re-measure and keep the latest messages (and the
    // input) in view. Fire at several ticks because the keyboard (and any iOS
    // accessory bar) animate in over a few hundred ms — a single measure can
    // land mid-animation and leave the input misaligned.
    input.addEventListener('focus', () => {
      [100, 300, 600].forEach((t) => setTimeout(() => {
        setAppHeight();
        stream.scrollTop = stream.scrollHeight;
      }, t));
    });

    // Passphrase masking (locked state only): keep the real characters in
    // `lockedEntry`, show bullets in the field. Pure JS — no password type, no
    // -webkit-text-security — so iOS never treats this as a credential field.
    // Diffs against the caret so backspace, delete and paste all stay in sync.
    function maskLockedInput() {
      const masked = input.value;
      const sel = input.selectionStart == null ? masked.length : input.selectionStart;
      const delta = masked.length - lockedEntry.length;
      if (delta >= 0) {
        const inserted = masked.slice(sel - delta, sel); // chars just typed/pasted
        lockedEntry = lockedEntry.slice(0, sel - delta) + inserted + lockedEntry.slice(sel - delta);
      } else {
        lockedEntry = lockedEntry.slice(0, sel) + lockedEntry.slice(sel - delta); // removed (-delta) chars
      }
      input.value = MASK_CHAR.repeat(lockedEntry.length);
      try { input.setSelectionRange(sel, sel); } catch {}
    }

    input.addEventListener('input', () => {
      if (!unlocked) maskLockedInput();
    });

    // ===== Boot splash =====
    // Show the ARTIFACT intro for 5s, fade it out, then remove it from the DOM.
    const intro = document.getElementById('intro');
    setTimeout(() => {
      intro.classList.add('is-hidden');
      if (!isTouch) input.focus();
      setTimeout(() => intro.remove(), 800); // after the fade transition
    }, 5000);
  </script>
</body>
</html>
