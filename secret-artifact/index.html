<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Privacy: keep this page 100% invisible to search engines & crawlers -->
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="referrer" content="no-referrer" />
  <meta name="theme-color" content="#0a0a16" />

  <title>THE ARTIFACT // ENGINE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* Deep space / cyberpunk palette */
      --bg-0:        #05050d;
      --bg-1:        #0a0a16;
      --bg-2:        #11112a;
      --grid:        rgba(178, 75, 255, 0.16);
      --glow-cyan:   #22e6ff;
      --glow-magenta:#ff2bd6;
      --glow-violet: #8a5bff;
      --ink:         #eaf2ff;
      --ink-dim:     #8f9bc7;
      --bubble-user: rgba(34, 230, 255, 0.10);
      --bubble-bot:  rgba(255, 43, 214, 0.09);

      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'Fira Code', 'SFMono-Regular', Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      min-height: 100dvh;
      background-color: var(--bg-0);
      color: var(--ink);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      /* Procedural neon grid + radial space glow */
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -10%, rgba(138, 91, 255, 0.22), transparent 60%),
        radial-gradient(ellipse 90% 60% at 90% 110%, rgba(255, 43, 214, 0.14), transparent 55%),
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        linear-gradient(180deg, var(--bg-1), var(--bg-0));
      background-size:
        100% 100%,
        100% 100%,
        44px 44px,
        44px 44px,
        100% 100%;
      background-attachment: fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(0.75rem, 2.5vw, 2rem);
    }

    /* ============ Glassmorphic chat container ============ */
    .artifact {
      position: relative; /* positioning context for the tuner dropdown overlay */
      width: 100%;
      max-width: 760px;
      height: min(92dvh, 880px);
      display: flex;
      flex-direction: column;
      background: linear-gradient(160deg, rgba(17, 17, 42, 0.78), rgba(10, 10, 22, 0.72));
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid rgba(34, 230, 255, 0.35);
      border-radius: 20px;
      box-shadow:
        0 0 0 1px rgba(255, 43, 214, 0.12),
        0 0 40px rgba(34, 230, 255, 0.12),
        0 0 80px rgba(255, 43, 214, 0.10),
        0 30px 80px rgba(0, 0, 0, 0.6);
      overflow: hidden;
    }

    /* ============ Header pack ============ */
    .artifact-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid rgba(138, 91, 255, 0.28);
      background: linear-gradient(90deg, rgba(34, 230, 255, 0.06), rgba(255, 43, 214, 0.06));
    }

    .artifact-title {
      font-family: var(--font-mono);
      font-size: clamp(0.74rem, 2.6vw, 0.95rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--ink);
      text-shadow: 0 0 12px rgba(34, 230, 255, 0.45);
      white-space: nowrap;
    }
    .artifact-title .sep { color: var(--glow-magenta); }

    .artifact-state {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--ink-dim);
      white-space: nowrap;
    }

    .artifact-reset {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      letter-spacing: 0.1em;
      color: var(--ink-dim);
      background: transparent;
      border: 1px solid rgba(138, 91, 255, 0.4);
      border-radius: 8px;
      padding: 0.25rem 0.5rem;
      cursor: pointer;
      transition: color 0.18s, border-color 0.18s, box-shadow 0.18s;
    }
    .artifact-reset:hover {
      color: var(--glow-magenta);
      border-color: var(--glow-magenta);
      box-shadow: 0 0 12px rgba(255, 43, 214, 0.3);
    }

    .pulse-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--glow-cyan);
      box-shadow: 0 0 10px var(--glow-cyan), 0 0 20px var(--glow-cyan);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: 1;   }
      50%      { transform: scale(1.5); opacity: 0.45; }
    }

    /* ============ Stream / thread ============ */
    .artifact-stream {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      scrollbar-width: thin;
      scrollbar-color: var(--glow-violet) transparent;
    }
    .artifact-stream::-webkit-scrollbar { width: 8px; }
    .artifact-stream::-webkit-scrollbar-thumb {
      background: rgba(138, 91, 255, 0.5);
      border-radius: 8px;
    }

    .bubble {
      max-width: 82%;
      padding: 0.7rem 0.95rem;
      font-size: 0.95rem;
      line-height: 1.5;
      border-radius: 16px;
      white-space: pre-wrap;
      word-wrap: break-word;
      animation: rise 0.28s ease;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* User: glowing cyan, right-aligned */
    .bubble.user {
      align-self: flex-end;
      background: var(--bubble-user);
      border: 1px solid rgba(34, 230, 255, 0.55);
      color: #d6fbff;
      box-shadow: 0 0 14px rgba(34, 230, 255, 0.18);
      border-bottom-right-radius: 4px;
    }

    /* Bot: dark magenta, left-aligned */
    .bubble.bot {
      align-self: flex-start;
      background: var(--bubble-bot);
      border: 1px solid rgba(255, 43, 214, 0.5);
      color: #ffd9f5;
      box-shadow: 0 0 14px rgba(255, 43, 214, 0.16);
      border-bottom-left-radius: 4px;
    }

    .bubble.system {
      align-self: center;
      background: rgba(138, 91, 255, 0.10);
      border: 1px dashed rgba(138, 91, 255, 0.45);
      color: var(--ink-dim);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      text-align: center;
    }

    /* ============ Typing indicator ============ */
    .typing {
      align-self: flex-start;
      display: none;
      align-items: center;
      gap: 5px;
      padding: 0.7rem 0.95rem;
      background: var(--bubble-bot);
      border: 1px solid rgba(255, 43, 214, 0.4);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }
    .typing.is-active { display: inline-flex; }
    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--glow-magenta);
      box-shadow: 0 0 8px var(--glow-magenta);
      animation: blink 1.2s infinite ease-in-out both;
    }
    .typing span:nth-child(2) { animation-delay: 0.18s; }
    .typing span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes blink {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1;   }
    }

    /* ============ Toolbar ============ */
    .artifact-toolbar {
      display: flex;
      gap: 0.6rem;
      padding: 0.85rem;
      border-top: 1px solid rgba(34, 230, 255, 0.22);
      background: rgba(5, 5, 13, 0.55);
    }

    .artifact-input {
      flex: 1 1 auto;
      min-width: 0;
      padding: 0.8rem 1rem;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      color: var(--ink);
      background: rgba(10, 10, 22, 0.8);
      border: 1px solid rgba(138, 91, 255, 0.4);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .artifact-input::placeholder { color: var(--ink-dim); }
    .artifact-input:focus {
      border-color: var(--glow-cyan);
      box-shadow: 0 0 0 1px var(--glow-cyan), 0 0 16px rgba(34, 230, 255, 0.25);
    }
    .artifact-toolbar.is-locked .artifact-input {
      border-color: rgba(255, 43, 214, 0.55);
      letter-spacing: 0.18em;
      /* NOTE: no -webkit-text-security here. It visually masked the passphrase
         but iOS/WebKit treats a text-security field as a PASSWORD field — which
         popped the AutoFill "Passwords" accessory (raising the keyboard) and got
         a credential saved for the domain that then haunted the chat input. A
         plain text field keeps iOS from ever treating this as a login. */
    }
    .artifact-toolbar.is-locked .artifact-input:focus {
      border-color: var(--glow-magenta);
      box-shadow: 0 0 0 1px var(--glow-magenta), 0 0 16px rgba(255, 43, 214, 0.3);
    }

    .artifact-send {
      flex: 0 0 auto;
      padding: 0 1.25rem;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #05050d;
      background: linear-gradient(135deg, var(--glow-cyan), var(--glow-magenta));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(34, 230, 255, 0.4);
      transition: transform 0.12s, box-shadow 0.18s, opacity 0.18s;
    }
    .artifact-send:hover { box-shadow: 0 0 26px rgba(255, 43, 214, 0.55); }
    .artifact-send:active { transform: scale(0.96); }
    .artifact-send:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

    /* ============ Mic / dictation button ============ */
    .artifact-mic {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 46px;
      padding: 0;
      color: var(--glow-cyan);
      background: rgba(10, 10, 22, 0.8);
      border: 1px solid rgba(34, 230, 255, 0.45);
      border-radius: 12px;
      cursor: pointer;
      transition: color 0.18s, background 0.18s, border-color 0.18s, box-shadow 0.18s, transform 0.12s;
    }
    .artifact-mic:hover { box-shadow: 0 0 16px rgba(34, 230, 255, 0.35); }
    .artifact-mic:active { transform: scale(0.96); }
    .artifact-mic svg { width: 20px; height: 20px; }
    /* Listening: solid neon cyan, gently pulsing. */
    .artifact-mic.is-listening {
      color: #05050d;
      background: var(--glow-cyan);
      border-color: var(--glow-cyan);
      animation: mic-pulse 1.3s ease-in-out infinite;
    }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34, 230, 255, 0.5); }
      50%      { box-shadow: 0 0 18px 5px rgba(34, 230, 255, 0.6); }
    }

    /* ============ Per-bubble replay (read aloud) ============ */
    .bubble-text { white-space: pre-wrap; word-wrap: break-word; }
    .bubble-replay {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
      width: 22px;
      height: 22px;
      margin-left: 0.5rem;
      padding: 0;
      color: var(--glow-magenta);
      background: transparent;
      border: 1px solid rgba(255, 43, 214, 0.5);
      border-radius: 50%;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.18s, color 0.18s, border-color 0.18s, box-shadow 0.18s;
    }
    .bubble-replay:hover { opacity: 1; box-shadow: 0 0 12px rgba(255, 43, 214, 0.45); }
    .bubble-replay svg { width: 11px; height: 11px; }
    /* While this bubble is being spoken aloud, flip it to cyan. */
    .bubble-replay.is-speaking {
      opacity: 1;
      color: var(--glow-cyan);
      border-color: var(--glow-cyan);
      box-shadow: 0 0 12px rgba(34, 230, 255, 0.5);
    }

    /* ============ Tuning console (persona tuner) ============ */
    /* Header toggle button carries an icon; size it to match LOCK/RESET. */
    .artifact-reset svg { width: 15px; height: 15px; display: block; }
    .artifact-tune.is-open {
      color: var(--glow-cyan);
      border-color: var(--glow-cyan);
      box-shadow: 0 0 12px rgba(34, 230, 255, 0.35);
    }

    /* Dropdown OVERLAY anchored under the header — floats over the chat instead
       of reflowing it, so it always appears cleanly above the conversation and
       the answer/input never get shoved around. --header-h is measured in JS. */
    .tuner {
      position: absolute;
      top: var(--header-h, 56px);
      left: 0;
      right: 0;
      z-index: 40;
      background: rgba(10, 10, 22, 0.97);
      -webkit-backdrop-filter: blur(10px) saturate(140%);
      backdrop-filter: blur(10px) saturate(140%);
      border-bottom: 1px solid rgba(138, 91, 255, 0.32);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.55);
      transform: translateY(-12px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.26s ease, transform 0.26s ease, visibility 0.26s ease;
    }
    .tuner.is-open {
      transform: translateY(0);
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }
    .tuner-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem 1.1rem;
    }

    .tuner-row { display: flex; flex-direction: column; gap: 0.45rem; }
    .tuner-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.6rem;
    }
    .tuner-name {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--ink-dim);
    }
    .tuner-val {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent, var(--glow-cyan));
      text-shadow: 0 0 10px var(--accent, var(--glow-cyan));
      min-width: 3.2ch;
      text-align: right;
    }

    /* Neon range slider. --accent (per row) tints fill + thumb glow;
       --fill (set in JS) is the filled percentage of the track. */
    .tuner-range {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 4px;
      background:
        linear-gradient(90deg,
          var(--accent, var(--glow-cyan)) 0%,
          var(--accent, var(--glow-cyan)) var(--fill, 50%),
          rgba(138, 91, 255, 0.18) var(--fill, 50%),
          rgba(138, 91, 255, 0.18) 100%);
      outline: none;
      cursor: pointer;
    }
    .tuner-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent, var(--glow-cyan));
      border: 2px solid #05050d;
      box-shadow: 0 0 8px var(--accent, var(--glow-cyan)),
                  0 0 16px var(--accent, var(--glow-cyan));
      cursor: pointer;
    }
    .tuner-range::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent, var(--glow-cyan));
      border: 2px solid #05050d;
      box-shadow: 0 0 8px var(--accent, var(--glow-cyan));
      cursor: pointer;
    }
    .tuner-range:focus-visible::-webkit-slider-thumb {
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.25),
                  0 0 16px var(--accent, var(--glow-cyan));
    }

    /* Quick presets — one-tap slider combos, each tinted by its --accent so it
       echoes the neon track colours. Sits above the sliders inside the panel. */
    .tuner-presets {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.1rem 0;
    }
    .tuner-preset {
      flex: 1 1 0;
      min-width: 0;
      font-family: var(--font-mono);
      font-size: 0.66rem;
      letter-spacing: 0.04em;
      line-height: 1.15;
      color: var(--ink-dim);
      text-align: center;
      padding: 0.5rem 0.35rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(138, 91, 255, 0.22);
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease,
                  box-shadow 0.2s ease, background 0.2s ease;
    }
    .tuner-preset:hover {
      color: var(--accent, var(--glow-cyan));
      border-color: var(--accent, var(--glow-cyan));
    }
    .tuner-preset.is-active {
      color: var(--accent, var(--glow-cyan));
      border-color: var(--accent, var(--glow-cyan));
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 0 12px -2px var(--accent, var(--glow-cyan));
      text-shadow: 0 0 8px var(--accent, var(--glow-cyan));
    }

    /* ============ Boot splash / intro ============ */
    .intro {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.6rem;
      background:
        radial-gradient(ellipse 120% 80% at 50% 42%, rgba(138, 91, 255, 0.24), transparent 60%),
        radial-gradient(ellipse 90% 60% at 90% 110%, rgba(255, 43, 214, 0.12), transparent 55%),
        linear-gradient(180deg, var(--bg-1), var(--bg-0));
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }
    .intro.is-hidden { opacity: 0; visibility: hidden; }

    .intro-word {
      font-family: var(--font-mono);
      font-size: clamp(2rem, 12vw, 5rem);
      font-weight: 600;
      letter-spacing: 0.32em;
      text-indent: 0.32em; /* offset trailing letter-spacing → stays centered */
      background: linear-gradient(135deg, var(--glow-cyan), var(--glow-magenta));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 18px rgba(34, 230, 255, 0.45))
              drop-shadow(0 0 36px rgba(255, 43, 214, 0.30));
      animation: intro-flicker 2.6s ease-in-out infinite;
    }
    @keyframes intro-flicker {
      0%, 100% { opacity: 1;    }
      48%      { opacity: 0.78; }
      50%      { opacity: 0.95; }
      52%      { opacity: 0.78; }
    }

    .intro-bar {
      width: min(220px, 52vw);
      height: 2px;
      background: rgba(138, 91, 255, 0.22);
      border-radius: 2px;
      overflow: hidden;
    }
    .intro-bar::after {
      content: "";
      display: block;
      height: 100%;
      width: 100%;
      transform-origin: left center;
      background: linear-gradient(90deg, var(--glow-cyan), var(--glow-magenta));
      box-shadow: 0 0 12px rgba(34, 230, 255, 0.6);
      animation: intro-load 5s linear forwards;
    }
    @keyframes intro-load {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    @media (max-width: 480px) {
      /* Lock the page so it can't "float" / scroll loose behind the chat. */
      html, body { height: 100%; overflow: hidden; }
      body { padding: 0; }
      .artifact {
        position: fixed;
        /* Anchor only the TOP — NOT bottom. Pinning bottom (inset:0) forces
           full layout-viewport height and makes the browser ignore the height
           below, leaving the input hidden behind the keyboard. */
        top: 0;
        left: 0;
        right: 0;
        /* Height = the REAL visible viewport (set in JS from visualViewport),
           so when the keyboard opens the container shrinks and the input stays
           just above it. Falls back to 100svh/100dvh until JS runs. */
        height: 100svh;
        height: var(--app-height, 100dvh);
        max-width: 100%;
        border-radius: 0;
        border-left: none;
        border-right: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .pulse-dot, .typing span, .bubble, .intro-word, .artifact-mic.is-listening { animation: none; }
      /* Keep the bar filled (still acts as a visible boot indicator). */
      .intro-bar::after { animation: none; transform: scaleX(1); }
    }
  </style>
</head>
<body>
  <!-- Boot splash: shows for 5s, then fades into the chat. -->
  <div class="intro" id="intro" role="status" aria-label="The Artifact booting">
    <div class="intro-word">ARTIFACT</div>
    <div class="intro-bar" aria-hidden="true"></div>
  </div>

  <main class="artifact" aria-label="The Artifact chat engine">
    <header class="artifact-header">
      <div class="artifact-title">THE ARTIFACT <span class="sep">/&gt;</span></div>
      <div class="artifact-state">
        <button type="button" class="artifact-reset artifact-tune" id="tune" title="Tuning console" aria-label="Open the tuning console" aria-expanded="false" aria-controls="tuner">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="4" y1="7" x2="20" y2="7"></line><circle cx="9" cy="7" r="2.4" fill="#0a0a16"></circle>
            <line x1="4" y1="12" x2="20" y2="12"></line><circle cx="15" cy="12" r="2.4" fill="#0a0a16"></circle>
            <line x1="4" y1="17" x2="20" y2="17"></line><circle cx="8" cy="17" r="2.4" fill="#0a0a16"></circle>
          </svg>
        </button>
        <button type="button" class="artifact-reset" id="lock" title="Lock chat" aria-label="Lock the chat">LOCK</button>
        <button type="button" class="artifact-reset" id="reset" title="Clear memory" aria-label="Clear conversation memory">RESET</button>
        <span class="pulse-dot" role="img" aria-label="Engine online"></span>
      </div>
    </header>

    <!-- Persona Tuner: collapsed by default, toggled by the header TUNE button. -->
    <section class="tuner" id="tuner" aria-label="Persona tuning console" aria-hidden="true">
      <div class="tuner-presets" role="group" aria-label="Quick presets">
        <button type="button" class="tuner-preset" data-preset="brainstorm" style="--accent: var(--glow-cyan);">Brainstorming</button>
        <button type="button" class="tuner-preset" data-preset="mirror" style="--accent: var(--glow-magenta);">The Mirror</button>
        <button type="button" class="tuner-preset" data-preset="architect" style="--accent: var(--glow-violet);">The Architect</button>
      </div>
      <div class="tuner-grid">
        <div class="tuner-row" style="--accent: var(--glow-cyan);">
          <div class="tuner-head">
            <span class="tuner-name">TEMPERATURE</span>
            <span class="tuner-val" id="tempVal">2.0</span>
          </div>
          <input class="tuner-range" id="tempRange" type="range" min="0" max="2" step="0.1" value="2" aria-label="Temperature (creativity)" />
        </div>
        <div class="tuner-row" style="--accent: var(--glow-magenta);">
          <div class="tuner-head">
            <span class="tuner-name">SARCASM</span>
            <span class="tuner-val" id="sarcVal">50%</span>
          </div>
          <input class="tuner-range" id="sarcRange" type="range" min="0" max="100" step="1" value="50" aria-label="Sarcasm level" />
        </div>
        <div class="tuner-row" style="--accent: var(--glow-violet);">
          <div class="tuner-head">
            <span class="tuner-name">SERIOUSNESS</span>
            <span class="tuner-val" id="serVal">50%</span>
          </div>
          <input class="tuner-range" id="serRange" type="range" min="0" max="100" step="1" value="50" aria-label="Seriousness level" />
        </div>
      </div>
    </section>

    <section class="artifact-stream" id="stream" aria-live="polite" aria-label="Conversation thread">
      <div class="bubble system">Engine online. Invoke the Artifact to begin.</div>
    </section>

    <div class="typing" id="typing" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>

    <form class="artifact-toolbar" id="toolbar" autocomplete="off">
      <input
        class="artifact-input"
        id="input"
        type="text"
        name="artifact-message"
        placeholder="Invoke the Artifact..."
        aria-label="Message the Artifact"
        maxlength="4000"
        enterkeyhint="send"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        data-1p-ignore
        data-lpignore="true"
      />
      <button class="artifact-mic" id="mic" type="button" title="Dictate (speech to text)" aria-label="Dictate your message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="9" y="2.5" width="6" height="11" rx="3"></rect>
          <path d="M5 11a7 7 0 0 0 14 0"></path>
          <line x1="12" y1="18" x2="12" y2="21.5"></line>
        </svg>
      </button>
      <button class="artifact-send" id="send" type="submit">SEND</button>
    </form>
  </main>

  <script>
    // ===== Abstraction layer =====================================
    // The front-end talks ONLY to this proxy Worker. No API keys,
    // no secrets ever live in this file. The Worker is responsible
    // for calling the model provider and — on the future roadmap —
    // routing each exchange to a Google Sheets archive via Apps Script.
    const API_URL = "https://artifact-engine.avatar68.workers.dev/api/chat";

    const stream  = document.getElementById('stream');
    const typing  = document.getElementById('typing');
    const form    = document.getElementById('toolbar');
    const input   = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const resetBtn = document.getElementById('reset');
    const lockBtn = document.getElementById('lock');

    // Replay-button glyphs: ▶ when idle, ■ while this bubble is being read.
    const PLAY_ICON = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>';
    const STOP_ICON = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';

    // Touch devices (iPhone): never programmatically pop the keyboard — let the
    // user tap the field themselves. focusInput() is therefore a no-op on touch,
    // which stops the input from "doing its own thing" during voice turns.
    const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    function focusInput() { if (!isTouch) input.focus(); }

    // ===== Access gate ===========================================
    // The chat is locked until the passphrase is entered. The passphrase is
    // NEVER stored in this file — it is validated server-side by the engine,
    // so the gate can't be bypassed by reading the source or hitting the
    // Worker directly. Previous conversations stay visible while locked.
    const KEY_STORE = 'artifact.key';
    let passphrase = readKey();
    let unlocked = !!passphrase;

    function readKey() {
      try { return sessionStorage.getItem(KEY_STORE) || ''; } catch { return ''; }
    }

    function applyLockUI() {
      // The input is ALWAYS a plain type="text" field — no password type and no
      // -webkit-text-security masking. Either of those makes iOS treat it as a
      // credential (AutoFill bar raises the keyboard; a saved password then
      // haunts the chat input). The locked state is signalled by the magenta
      // border + UNLOCK button instead of dot-masking.
      if (unlocked) {
        input.placeholder = persona === 'dion' ? 'Ask Dion, agápi mou...' : 'Invoke the Artifact...';
        sendBtn.textContent = 'SEND';
        lockBtn.style.display = '';
        form.classList.remove('is-locked');
      } else {
        input.placeholder = '🔒 Type the passphrase to unlock...';
        sendBtn.textContent = 'UNLOCK';
        lockBtn.style.display = 'none';
        form.classList.add('is-locked');
      }
    }

    async function verifyPassphrase(pass) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ verify: true, passphrase: pass })
      });
      return res.ok;
    }

    function lock(message) {
      unlocked = false;
      passphrase = '';
      try { sessionStorage.removeItem(KEY_STORE); } catch {}
      applyLockUI();
      if (message) addBubble(message, 'system');
      focusInput();
    }

    // ===== Persona ================================================
    // Two voices share this UI: the default 'gemma' (The Artifact) and 'dion'
    // (the Mykonos concierge). Typing the bare word DION or GEMMA while unlocked
    // flips between them — no model call is spent on the switch. The active
    // persona rides along in every request so the engine picks the right system
    // prompt. Each persona keeps its OWN transcript (separate localStorage key),
    // so the conversations never bleed into each other.
    const PERSONA_KEY = 'artifact.persona.v1';
    function loadPersona() {
      try { return localStorage.getItem(PERSONA_KEY) === 'dion' ? 'dion' : 'gemma'; }
      catch { return 'gemma'; }
    }
    let persona = loadPersona();
    // gemma keeps the original key so existing memory survives; dion gets its own.
    function storeKeyFor(p) { return p === 'dion' ? 'artifact.history.dion.v1' : 'artifact.history.v1'; }

    // ===== Long-term memory (Gemma only) =========================
    // A small, curated set of facts the user explicitly pins ("θυμήσου …").
    // Unlike the transcript, these are NEVER trimmed and survive a memory wipe /
    // new session — they ride along as `memory:[…]` on every Gemma request and
    // the engine folds them into the system instruction. DION has no memory.
    const MEMORY_KEY = 'artifact.memory.gemma.v1';
    const MEMORY_MAX = 100;        // max pinned facts
    const MEMORY_FACT_MAX = 500;   // max chars per fact
    function loadMemory() {
      try { const a = JSON.parse(localStorage.getItem(MEMORY_KEY) || '[]'); return Array.isArray(a) ? a : []; }
      catch { return []; }
    }
    let memory = loadMemory();
    function saveMemory() {
      try { localStorage.setItem(MEMORY_KEY, JSON.stringify(memory)); } catch { /* storage full/off */ }
    }
    function addMemory(fact) {
      fact = (fact || '').trim().replace(/\s+/g, ' ')
        .replace(/^(?:ότι|οτι|πως|πώς|that)\s+/i, '')   // "θυμήσου ότι X" → "X"
        .slice(0, MEMORY_FACT_MAX);
      if (!fact) return 'empty';
      if (memory.some((m) => m.toLowerCase() === fact.toLowerCase())) return 'dup';
      memory.push(fact);
      if (memory.length > MEMORY_MAX) memory = memory.slice(-MEMORY_MAX);
      saveMemory();
      return fact;
    }

    // Memory commands (Gemma only). Returns a command object or null.
    function parseMemoryCommand(value) {
      // NB: \b is unreliable with Greek (non-ASCII isn't a JS \w), so we use a
      // lookahead for a separator/end instead — works for Greek and English.
      var add = value.match(/^\s*(?:\/remember|remember|θυμ[ήη]σου|να\s+θυμ[άα]σαι)(?=[\s:：,—–-]|$)[\s:：,—–-]*(.+)$/is);
      if (add && add[1].trim()) return { type: 'add', fact: add[1] };
      if (/^\s*\/?(?:memory|μν[ήη]μη)\s*[?;]?\s*$/i.test(value)) return { type: 'list' };
      // forget: optional argument. A number → drop just that one; "all"/"τα"/
      // "όλα"/"τη μνήμη"/nothing → clear everything.
      var forget = value.match(/^\s*\/?(?:forget|ξ[έε]χασ[έε]?|σβ[ήη]σε)(?:\s+(all|τα|όλα|ολα|τη\s+μν[ήη]μη|\d+))?\s*$/i);
      if (forget) {
        var arg = forget[1] || '';
        var idx = /^\d+$/.test(arg) ? parseInt(arg, 10) : null;
        return { type: 'forget', index: idx };
      }
      return null;
    }
    function runMemoryCommand(cmd) {
      if (cmd.type === 'add') {
        const r = addMemory(cmd.fact);
        if (r === 'dup') addBubble('🧠 Το έχω ήδη στη μνήμη.', 'system');
        else if (r === 'empty') addBubble('🧠 Δεν κατάλαβα τι να θυμηθώ — πες «θυμήσου …».', 'system');
        else addBubble('🧠 Κράτησα στη μνήμη: “' + r + '”. Θα τη θυμάμαι και σε επόμενες κουβέντες.', 'system');
      } else if (cmd.type === 'list') {
        if (!memory.length) addBubble('🧠 Η μνήμη είναι άδεια. Πες «θυμήσου …» για να προσθέσεις κάτι.', 'system');
        else addBubble('🧠 Θυμάμαι (' + memory.length + '):\n' + memory.map((m, i) => (i + 1) + '. ' + m).join('\n') + '\n\n(«/forget 2» σβήνει τη #2, «/forget» όλα.)', 'system');
      } else if (cmd.type === 'forget') {
        if (cmd.index != null) {
          const i = cmd.index - 1;
          if (i < 0 || i >= memory.length) {
            addBubble('🧠 Δεν υπάρχει μνήμη #' + cmd.index + '. («/memory» για τη λίστα.)', 'system');
          } else {
            const removed = memory.splice(i, 1)[0];
            saveMemory();
            addBubble('🧠 Έσβησα τη #' + cmd.index + ': “' + removed + '”.' + (memory.length ? '' : ' Η μνήμη είναι πλέον άδεια.'), 'system');
          }
        } else {
          const n = memory.length;
          memory = []; saveMemory();
          addBubble(n ? '🧠 Καθάρισα όλη τη μνήμη (' + n + ').' : '🧠 Η μνήμη ήταν ήδη άδεια.', 'system');
        }
      }
    }

    // ===== Transcript memory =====================================
    // The brains keep the full transcript and persist it in localStorage,
    // so the Artifact remembers the conversation across reloads. Every turn
    // the entire history is sent to the engine for true multi-turn context.
    let history = loadHistory();

    function loadHistory() {
      try {
        const raw = localStorage.getItem(storeKeyFor(persona));
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveHistory() {
      try {
        localStorage.setItem(storeKeyFor(persona), JSON.stringify(history));
      } catch { /* storage full / disabled — memory stays in-session only */ }
    }

    function addBubble(text, role) {
      const el = document.createElement('div');
      el.className = 'bubble ' + role;
      if (role === 'bot') {
        // Bot bubbles get a text span + a neon replay (read-aloud) button.
        // Keeping the text in its own span means the button glyph never
        // leaks into what we speak.
        const span = document.createElement('span');
        span.className = 'bubble-text';
        span.textContent = text;
        el.appendChild(span);

        const replay = document.createElement('button');
        replay.type = 'button';
        replay.className = 'bubble-replay';
        replay.title = 'Read aloud';
        replay.setAttribute('aria-label', 'Read this message aloud');
        replay.innerHTML = PLAY_ICON;
        // Toggle: play if idle, stop if this bubble is currently being read.
        // Read the span's CURRENT text (not the value at creation), so a bubble
        // that was filled in by streaming still speaks its full final answer.
        replay.addEventListener('click', () => {
          if (replay.classList.contains('is-speaking')) stopSpeak();
          else speak(span.textContent, replay);
        });
        el.appendChild(replay);
      } else {
        el.textContent = text;
      }
      stream.appendChild(el);
      stream.scrollTop = stream.scrollHeight;
      return el;
    }

    // Replay saved history on load (skip the static system greeting).
    history.forEach((m) => addBubble(m.text, m.role === 'model' ? 'bot' : 'user'));

    function setBusy(busy) {
      sendBtn.disabled = busy;
      input.disabled = busy;
      typing.classList.toggle('is-active', busy);
      typing.setAttribute('aria-hidden', String(!busy));
      if (busy) {
        stream.appendChild(typing); // keep indicator pinned to the bottom
        stream.scrollTop = stream.scrollHeight;
      }
    }

    // Stream the reply via Server-Sent Events. The engine sends `stream:true`
    // and emits `data: {"delta":"…"}` lines as tokens arrive, then
    // `data: {"done":true}`. onDelta runs for each chunk; the full text is
    // returned at the end. Falls back to reading the whole body at once on
    // browsers without fetch-stream support — same parser, just non-incremental.
    async function streamInvoke(onDelta) {
      // Send the FULL transcript (+ passphrase + persona + dials) so the engine
      // has context. `stream:true` opts into the SSE response.
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: history, passphrase, persona, stream: true, params: currentParams(),
          // Pinned long-term facts — Gemma only; omitted (undefined → dropped) for DION.
          memory: persona === 'gemma' && memory.length ? memory : undefined
        })
      });

      if (res.status === 401) {
        const e = new Error('locked');
        e.locked = true;
        throw e;
      }
      if (res.status === 503) {
        // Kill switch is on — the engine is offline for everyone.
        const data = await res.json().catch(() => ({}));
        const e = new Error(data.reply || data.message || 'The Artifact is offline right now.');
        e.offline = true;
        throw e;
      }
      if (!res.ok) {
        throw new Error('Engine responded with status ' + res.status);
      }

      // Backward / fallback compatible: if the engine answered with plain JSON
      // (an older Worker that ignores `stream`, or any non-SSE reply), take the
      // whole reply at once instead of trying to parse it as an event stream.
      const ctype = res.headers.get('content-type') || '';
      if (!ctype.includes('text/event-stream')) {
        const data = await res.json().catch(() => ({}));
        // A kill/antidote phrase was matched server-side — signal the caller to
        // scrub it from the transcript instead of treating it as a reply.
        if (data.control) return { __control: data.control, ok: data.ok, killed: data.killed, error: data.error };
        const reply = data.reply || data.message || data.response || '(empty response)';
        onDelta(reply);
        return reply;
      }

      let full = '';
      // Parse one or more "\n\n"-separated SSE events out of a text buffer,
      // firing onDelta and accumulating. Returns the leftover partial tail.
      function drain(buf, flush) {
        let idx;
        while ((idx = buf.indexOf('\n\n')) >= 0) {
          const evt = buf.slice(0, idx);
          buf = buf.slice(idx + 2);
          const line = evt.split('\n').find((l) => l.startsWith('data:'));
          if (!line) continue;
          const payload = line.slice(5).trim();
          if (!payload) continue;
          let data;
          try { data = JSON.parse(payload); } catch { continue; }
          if (data.error) throw new Error(data.error);
          if (data.delta) { full += data.delta; onDelta(data.delta); }
          // data.done → stream finished; loop just ends naturally.
        }
        return buf;
      }

      if (res.body && typeof res.body.getReader === 'function') {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          buf = drain(buf);
        }
      } else {
        // No streaming reader — read it all, then parse in one pass.
        drain(await res.text() + '\n\n');
      }

      return full;
    }

    // The owner typed a secret KILL_SWITCH / ANTIDOTE phrase — the engine matched
    // it and toggled the kill flag instead of replying. Show the outcome.
    function showControlResult(r) {
      if (r.error === 'kv-missing') {
        addBubble('⚠️ Ο διακόπτης δεν είναι ρυθμισμένος (λείπει το KV namespace). Δες engine/README.', 'system');
      } else if (r.error) {
        addBubble('⚠️ Η ενέργεια δεν ολοκληρώθηκε.', 'system');
      } else if (r.killed) {
        addBubble('🔴 Engine OFFLINE για όλους. Γράψε τη φράση ANTIDOTE για επαναφορά.', 'system');
      } else {
        addBubble('🟢 Engine ONLINE ξανά.', 'system');
      }
    }

    async function handleSubmit(event) {
      event.preventDefault();
      // This runs inside a user gesture — unlock iOS speech output so the
      // Artifact's reply can be read aloud automatically when it arrives.
      unlockTTS();
      const value = input.value.trim();
      if (!value || sendBtn.disabled) return;

      // While locked, the entry is a passphrase attempt — not a message.
      if (!unlocked) {
        sendBtn.disabled = true;
        let ok = false;
        try { ok = await verifyPassphrase(value); } catch {}
        sendBtn.disabled = false;
        input.value = '';
        if (ok) {
          passphrase = value;
          try { sessionStorage.setItem(KEY_STORE, passphrase); } catch {}
          unlocked = true;
          applyLockUI();
          addBubble('Access granted. Invoke the Artifact.', 'system');
        } else {
          addBubble('🔒 Wrong passphrase — the chat stays locked.', 'system');
        }
        focusInput();
        return;
      }

      // Persona switch: the bare word DION / GEMMA (case-insensitive) is a
      // control command, not a message — flip voices and bail before sending.
      const cmd = value.toLowerCase();
      if (cmd === 'dion' || cmd === 'gemma') {
        input.value = '';
        switchPersona(cmd);
        focusInput();
        return;
      }

      // Long-term memory commands — Gemma only, handled locally (no model call).
      if (persona === 'gemma') {
        const memCmd = parseMemoryCommand(value);
        if (memCmd) {
          input.value = '';
          runMemoryCommand(memCmd);
          focusInput();
          return;
        }
      }

      // Tuning while chatting? Get the panel out of the way so it never sits
      // over the incoming answer.
      closeTuner();
      const message = value;
      const userEl = addBubble(message, 'user');
      history.push({ role: 'user', text: message });
      saveHistory();
      input.value = '';
      setBusy(true);

      let botEl = null, botSpan = null;
      try {
        const full = await streamInvoke((delta) => {
          if (!botEl) {
            // First token arrived: hide the typing dots, open the answer bubble.
            typing.classList.remove('is-active');
            typing.setAttribute('aria-hidden', 'true');
            botEl = addBubble('', 'bot');
            botSpan = botEl.querySelector('.bubble-text');
          }
          botSpan.textContent += delta;
          stream.scrollTop = stream.scrollHeight;
        });
        setBusy(false);

        // Secret kill/antidote phrase: the engine toggled instead of replying.
        // Scrub the phrase from the bubble + transcript so it isn't stored.
        if (full && typeof full === 'object' && full.__control) {
          if (userEl) userEl.remove();
          if (history.length && history[history.length - 1].role === 'user') {
            history.pop();
            saveHistory();
          }
          showControlResult(full);
          focusInput();
          return;
        }

        const finalText = full || '(empty response)';
        if (!botEl) botEl = addBubble(finalText, 'bot');           // nothing streamed
        else if (!full) botSpan.textContent = finalText;            // streamed empty
        history.push({ role: 'model', text: finalText });
        saveHistory();
        // Auto read-aloud the fresh reply (history replay never speaks).
        speak(finalText, botEl.querySelector('.bubble-replay'));
      } catch (err) {
        setBusy(false);
        if (err && err.locked) {
          // Engine rejected the passphrase — re-lock and ask again.
          lock('🔒 Session locked — enter the passphrase again.');
        } else if (err && err.offline) {
          // Kill switch active — show the engine's offline message calmly.
          addBubble(err.message, 'system');
        } else {
          // Systemic fallback — the engine stays graceful on any exception.
          addBubble(
            '// SIGNAL LOST — the Artifact could not be reached. Check the engine endpoint and try again.',
            'system'
          );
        }
        console.error('[Artifact] fetch failed:', err);
      }

      focusInput();
    }

    function handleReset() {
      history = [];
      saveHistory();
      // Clear all bubbles, then restore the system greeting.
      stream.innerHTML = '';
      addBubble('Memory wiped. Invoke the Artifact to begin anew.', 'system');
      focusInput();
    }

    function personaLabel(p) { return p === 'dion' ? 'Dion — Mykonos Concierge' : 'The Artifact'; }

    function switchPersona(target) {
      if (target === persona) {
        addBubble(`Already speaking with ${personaLabel(target)}.`, 'system');
        return;
      }
      try { stopSpeak(); } catch {}      // silence any in-flight read-aloud
      persona = target;
      try { localStorage.setItem(PERSONA_KEY, persona); } catch {}
      // Swap in the target persona's own transcript and repaint the window.
      history = loadHistory();
      stream.innerHTML = '';
      history.forEach((m) => addBubble(m.text, m.role === 'model' ? 'bot' : 'user'));
      applyLockUI();                      // refresh the placeholder to the new voice
      addBubble(target === 'dion'
        ? '✨ Concierge active — you are now speaking with Dion. (Type GEMMA to return.)'
        : 'Back with The Artifact. (Type DION for the Mykonos concierge.)', 'system');
    }

    // SEND button click + Enter keypress both submit via the form.
    form.addEventListener('submit', handleSubmit);
    resetBtn.addEventListener('click', handleReset);
    lockBtn.addEventListener('click', () => lock('🔒 Locked. Enter the passphrase to chat.'));

    // ===== Voice: Text-to-Speech (read aloud) ====================
    const synth = window.speechSynthesis;
    let ttsUnlocked = false;
    let speakingBtn = null;

    // Match the spoken language to the text: Greek glyphs → el-GR, else en-US.
    function detectLang(text) {
      // Greek block (U+0370–U+03FF) or Greek Extended (U+1F00–U+1FFF) → Greek.
      return /[\u0370-\u03FF\u1F00-\u1FFF]/.test(text) ? 'el-GR' : 'en-US';
    }
    // Prefer Apple/Google "premium"/"enhanced" voices — their intonation is far
    // more natural than the default compact voices. We can't query gender (the
    // Web Speech API doesn't expose it), so we match the known-natural named
    // voices first: Samantha for English, Melina for Greek.
    const PREMIUM_NAME = { en: /samantha/i, el: /melina/i };
    const PREMIUM_TAG = /premium|enhanced/i;
    function isPremiumVoice(v) {
      return !!v && (PREMIUM_TAG.test(v.voiceURI || '') || PREMIUM_TAG.test(v.name || ''));
    }
    function pickVoice(lang) {
      const voices = synth ? synth.getVoices() : [];
      const base = lang.split('-')[0];
      const norm = (v) => (v.lang || '').replace('_', '-');
      const inLang = voices.filter((v) => norm(v).toLowerCase().startsWith(base));
      const pool = inLang.length ? inLang : voices;
      const named = PREMIUM_NAME[base];
      // premium Samantha/Melina → any Samantha/Melina → any premium/enhanced in
      // this language → exact locale match → first available.
      return (named && pool.find((v) => named.test(v.name) && isPremiumVoice(v)))
          || (named && pool.find((v) => named.test(v.name)))
          || pool.find(isPremiumVoice)
          || pool.find((v) => norm(v) === lang)
          || pool[0]
          || null;
    }
    // iOS only allows speech after a user gesture; speaking an empty utterance
    // during a tap grants permission for later programmatic (auto-read) speech.
    function unlockTTS() {
      if (!synth || ttsUnlocked) return;
      try { synth.speak(new SpeechSynthesisUtterance('')); ttsUnlocked = true; } catch {}
    }
    // Reset a replay button back to its idle ▶ state.
    function resetBtnIcon(btn) {
      if (!btn) return;
      btn.classList.remove('is-speaking');
      btn.innerHTML = PLAY_ICON;
      btn.title = 'Read aloud';
      btn.setAttribute('aria-label', 'Read this message aloud');
    }
    // Stop any read-aloud in progress (used by the bubble's ■ toggle).
    function stopSpeak() {
      if (synth) synth.cancel();
      resetBtnIcon(speakingBtn);
      speakingBtn = null;
    }
    // Strip emojis & markdown punctuation before speaking so the TTS engine
    // doesn't stumble on symbols (pausing on "*"/">"/"#") or read emoji names
    // aloud. Sentence punctuation is kept — it drives natural prosody.
    function cleanForSpeech(text) {
      return String(text || '')
        .replace(/\p{Extended_Pictographic}/gu, '')   // emojis
        .replace(/[\u200D\uFE0F\u20E3]/g, "")           // ZWJ / variation selector / keycap
        .replace(/[*_`#>~|]/g, ' ')                   // markdown markers
        .replace(/\s+/g, ' ')                       // collapse whitespace
        .trim();
    }
    function speak(text, btn) {
      if (!synth) return;
      text = cleanForSpeech(text);
      if (!text) return;
      synth.cancel(); // stop any in-flight speech cleanly before starting
      resetBtnIcon(speakingBtn);
      speakingBtn = null;

      const u = new SpeechSynthesisUtterance(text);
      u.lang = detectLang(text);
      const v = pickVoice(u.lang);
      if (v) u.voice = v;
      // Slightly slower + slightly lower than default: a hair under 1.0 reads as
      // "considered" rather than rushed, and a gently lowered pitch keeps the
      // premium voice from sounding thin/screechy (without masculinising it).
      u.rate = 0.92;
      u.pitch = 0.9;

      if (btn) {
        speakingBtn = btn;
        btn.classList.add('is-speaking');
        btn.innerHTML = STOP_ICON;           // becomes a STOP button while reading
        btn.title = 'Stop';
        btn.setAttribute('aria-label', 'Stop reading');
        const clear = () => {
          resetBtnIcon(btn);
          if (speakingBtn === btn) speakingBtn = null;
        };
        u.onend = clear;
        u.onerror = clear;
      }
      synth.speak(u);
    }
    // Voices can load asynchronously — touch the list once they're ready.
    if (synth && typeof synth.onvoiceschanged !== 'undefined') {
      synth.onvoiceschanged = () => { pickVoice('el-GR'); };
    }
    // Stop speech if the page is hidden or navigated away from.
    window.addEventListener('pagehide', () => { if (synth) synth.cancel(); });
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && synth) synth.cancel();
    });

    // ===== Voice: Speech-to-Text (dictation) =====================
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const micBtn = document.getElementById('mic');
    let listening = false;

    if (SR) {
      const recognition = new SR();
      // Default to Greek — this is a Greek-first chat, and the browser locale
      // (often en on iOS) was making it transcribe Greek speech as English.
      recognition.lang = 'el-GR';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.continuous = false;

      function stopListeningUI() {
        listening = false;
        micBtn.classList.remove('is-listening');
      }

      recognition.addEventListener('result', (e) => {
        const transcript = Array.from(e.results)
          .map((r) => r[0].transcript)
          .join(' ')
          .trim();
        if (!transcript) return;
        input.value = transcript;
        // Auto-send through the existing form flow (handleSubmit → invoke).
        if (typeof form.requestSubmit === 'function') form.requestSubmit();
        else handleSubmit(new Event('submit'));
      });
      recognition.addEventListener('end', stopListeningUI);
      recognition.addEventListener('error', stopListeningUI);

      micBtn.addEventListener('click', () => {
        unlockTTS(); // same tap also unlocks read-aloud on iOS
        if (listening) { recognition.stop(); return; }
        try {
          listening = true;
          micBtn.classList.add('is-listening');
          recognition.start();
        } catch { stopListeningUI(); }
      });
    } else {
      // Dictation unavailable (e.g. iOS Safari) — hide the mic gracefully.
      micBtn.style.display = 'none';
    }

    // ===== Persona Tuner (sliders) ===============================
    const tuneBtn = document.getElementById('tune');
    const tuner   = document.getElementById('tuner');
    const PARAMS_KEY = 'artifact.params.v1';
    const sliders = {
      temperature: { el: document.getElementById('tempRange'), val: document.getElementById('tempVal'), fmt: (v) => Number(v).toFixed(1) },
      sarcasm:     { el: document.getElementById('sarcRange'), val: document.getElementById('sarcVal'), fmt: (v) => Math.round(v) + '%' },
      seriousness: { el: document.getElementById('serRange'),  val: document.getElementById('serVal'),  fmt: (v) => Math.round(v) + '%' },
    };

    // The values sent with every message (temperature 0–2, the rest 0–100).
    function currentParams() {
      return {
        temperature: parseFloat(sliders.temperature.el.value),
        sarcasm:     parseInt(sliders.sarcasm.el.value, 10),
        seriousness: parseInt(sliders.seriousness.el.value, 10),
      };
    }
    function saveParams() {
      try { localStorage.setItem(PARAMS_KEY, JSON.stringify(currentParams())); } catch {}
    }
    // Repaint one slider: live number + neon "filled" portion of the track.
    function refreshSlider(key) {
      const s = sliders[key];
      const min = parseFloat(s.el.min), max = parseFloat(s.el.max), v = parseFloat(s.el.value);
      const pct = max > min ? ((v - min) / (max - min)) * 100 : 0;
      s.el.style.setProperty('--fill', pct + '%');
      s.val.textContent = s.fmt(v);
    }

    // Restore saved values, then wire live updates.
    try {
      const saved = JSON.parse(localStorage.getItem(PARAMS_KEY) || '{}');
      if (saved && typeof saved === 'object') {
        if (Number.isFinite(saved.temperature)) sliders.temperature.el.value = saved.temperature;
        if (Number.isFinite(saved.sarcasm))     sliders.sarcasm.el.value     = saved.sarcasm;
        if (Number.isFinite(saved.seriousness)) sliders.seriousness.el.value = saved.seriousness;
      }
    } catch {}
    // One-tap presets — each sets all three sliders at once. The active button
    // lights up only while the live values still match it (cleared on any drag).
    const PRESETS = {
      brainstorm: { temperature: 1.9, sarcasm: 27, seriousness: 18 },
      mirror:     { temperature: 0.9, sarcasm: 72, seriousness: 54 },
      architect:  { temperature: 0.3, sarcasm: 0,  seriousness: 90 },
    };
    const presetBtns = Array.from(document.querySelectorAll('.tuner-preset'));
    function updateActivePreset() {
      const cur = currentParams();
      presetBtns.forEach((btn) => {
        const p = PRESETS[btn.dataset.preset];
        const match = p &&
          Math.abs(cur.temperature - p.temperature) < 0.05 &&
          cur.sarcasm === p.sarcasm &&
          cur.seriousness === p.seriousness;
        btn.classList.toggle('is-active', !!match);
      });
    }
    function applyPreset(name) {
      const p = PRESETS[name];
      if (!p) return;
      sliders.temperature.el.value = p.temperature;
      sliders.sarcasm.el.value     = p.sarcasm;
      sliders.seriousness.el.value = p.seriousness;
      Object.keys(sliders).forEach(refreshSlider);
      saveParams();
      updateActivePreset();
    }
    presetBtns.forEach((btn) => {
      btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
    });

    Object.keys(sliders).forEach((key) => {
      refreshSlider(key);
      sliders[key].el.addEventListener('input', () => { refreshSlider(key); saveParams(); updateActivePreset(); });
    });
    updateActivePreset();

    // The dropdown overlay anchors under the header — measure its height so the
    // panel always sits exactly below it (header height shifts with text/zoom).
    const headerEl = document.querySelector('.artifact-header');
    function setHeaderHeight() {
      if (headerEl) {
        document.documentElement.style.setProperty('--header-h', headerEl.offsetHeight + 'px');
      }
    }
    setHeaderHeight();
    window.addEventListener('resize', setHeaderHeight);
    window.addEventListener('orientationchange', setHeaderHeight);

    function setTuner(open) {
      tuner.classList.toggle('is-open', open);
      tuneBtn.classList.toggle('is-open', open);
      tuner.setAttribute('aria-hidden', String(!open));
      tuneBtn.setAttribute('aria-expanded', String(open));
    }
    function closeTuner() { setTuner(false); }

    tuneBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      setHeaderHeight(); // re-measure right before opening
      setTuner(!tuner.classList.contains('is-open'));
    });
    // Tap anywhere outside the panel (or the chat) closes it — keeps things tidy.
    document.addEventListener('click', (e) => {
      if (!tuner.classList.contains('is-open')) return;
      if (tuner.contains(e.target) || tuneBtn.contains(e.target)) return;
      closeTuner();
    });

    applyLockUI();

    // ===== iOS viewport fit ======================================
    // iOS Safari's dvh/svh units don't track the keyboard or the URL bar
    // reliably, which makes the chat "float" until you pinch + reload. We
    // instead pin the container to the actual visible viewport reported by
    // visualViewport, updating it whenever the keyboard or address bar moves.
    const vv = window.visualViewport;
    function setAppHeight() {
      const h = vv ? vv.height : window.innerHeight;
      document.documentElement.style.setProperty('--app-height', h + 'px');
    }
    setAppHeight();
    if (vv) {
      vv.addEventListener('resize', setAppHeight);
      vv.addEventListener('scroll', setAppHeight);
    }
    window.addEventListener('orientationchange', setAppHeight);

    // When the keyboard opens, re-measure and keep the latest messages (and the
    // input) in view. Fire at several ticks because the keyboard (and any iOS
    // accessory bar) animate in over a few hundred ms — a single measure can
    // land mid-animation and leave the input misaligned.
    input.addEventListener('focus', () => {
      [100, 300, 600].forEach((t) => setTimeout(() => {
        setAppHeight();
        stream.scrollTop = stream.scrollHeight;
      }, t));
    });

    // ===== Boot splash =====
    // Show the ARTIFACT intro for 5s, fade it out, then remove it from the DOM.
    const intro = document.getElementById('intro');
    setTimeout(() => {
      intro.classList.add('is-hidden');
      if (!isTouch) input.focus();
      setTimeout(() => intro.remove(), 800); // after the fade transition
    }, 5000);
  </script>
</body>
</html>
